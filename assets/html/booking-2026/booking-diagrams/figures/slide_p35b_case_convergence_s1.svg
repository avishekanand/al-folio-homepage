<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" font-family="Georgia, 'Times New Roman', serif" width="1100" height="480">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  
  
  

  <!-- background grid -->
  <g stroke="#e8e2d6" stroke-width="1">
    <line x1="130" y1="468" x2="880" y2="468"/>
    <line x1="130" y1="396" x2="880" y2="396"/>
    <line x1="130" y1="324" x2="880" y2="324"/>
    <line x1="130" y1="252" x2="880" y2="252"/>
    <!-- vertical gridlines -->
    <line x1="237.1" y1="180" x2="237.1" y2="540" stroke-dasharray="2,4"/>
    <line x1="344.3" y1="180" x2="344.3" y2="540" stroke-dasharray="2,4"/>
    <line x1="451.4" y1="180" x2="451.4" y2="540" stroke-dasharray="2,4"/>
    <line x1="558.6" y1="180" x2="558.6" y2="540" stroke-dasharray="2,4"/>
    <line x1="665.7" y1="180" x2="665.7" y2="540" stroke-dasharray="2,4"/>
    <line x1="772.9" y1="180" x2="772.9" y2="540" stroke-dasharray="2,4"/>
  </g>

  <!-- convergence threshold zone -->
  <rect x="130" y="522" width="750" height="18" fill="#2a4747" fill-opacity="0.05"/>
  <line x1="130" y1="522" x2="880" y2="522" stroke="#2a4747" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="885" y="526" font-size="11" fill="#2a4747" font-style="italic">converged (g &lt; 0.05)</text>

  <!-- axes -->
  <line x1="130" y1="540" x2="880" y2="540" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="180" x2="130" y2="540" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- y-axis ticks -->
  <g font-size="13" fill="#1a1a1a" text-anchor="end">
    <text x="118" y="545">0.0</text>
    <text x="118" y="473">0.2</text>
    <text x="118" y="401">0.4</text>
    <text x="118" y="329">0.6</text>
    <text x="118" y="257">0.8</text>
    <text x="118" y="185">1.0</text>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="125" y1="540" x2="130" y2="540"/>
    <line x1="125" y1="468" x2="130" y2="468"/>
    <line x1="125" y1="396" x2="130" y2="396"/>
    <line x1="125" y1="324" x2="130" y2="324"/>
    <line x1="125" y1="252" x2="130" y2="252"/>
    <line x1="125" y1="180" x2="130" y2="180"/>
  </g>
  <text x="60" y="360" font-size="15" fill="#1a1a1a" text-anchor="middle"
        transform="rotate(-90 60 360)" font-style="italic">
    Gap-index  (lower = better)
  </text>

  <!-- x-axis ticks -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="130" y1="540" x2="130" y2="545"/>
    <line x1="237.1" y1="540" x2="237.1" y2="545"/>
    <line x1="344.3" y1="540" x2="344.3" y2="545"/>
    <line x1="451.4" y1="540" x2="451.4" y2="545"/>
    <line x1="558.6" y1="540" x2="558.6" y2="545"/>
    <line x1="665.7" y1="540" x2="665.7" y2="545"/>
    <line x1="772.9" y1="540" x2="772.9" y2="545"/>
    <line x1="880" y1="540" x2="880" y2="545"/>
  </g>
  <g font-size="13" fill="#1a1a1a" text-anchor="middle">
    <text x="130" y="565">0</text>
    <text x="237.1" y="565">1k</text>
    <text x="344.3" y="565">2k</text>
    <text x="451.4" y="565">3k</text>
    <text x="558.6" y="565">4k</text>
    <text x="665.7" y="565">5k</text>
    <text x="772.9" y="565">6k</text>
    <text x="880" y="565">7k</text>
  </g>
  <text x="505" y="600" font-size="15" fill="#1a1a1a" text-anchor="middle" font-style="italic">
    iterations
  </text>
</svg>
