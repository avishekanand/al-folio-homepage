<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- ===== HEADER ===== -->
  <text x="80" y="56" font-size="22" font-weight="bold" fill="#1a1a1a">Explainable Information Retrieval: A Survey</text>
  <text x="80" y="78" font-size="13" fill="#2a4747">Avishek Anand, Lijun Lyu · TU Delft  ·  Maximilian Idahl, Yumeng Wang, Jonas Wallat, Zijian Zhang · L3S / Leibniz Hannover</text>
  <text x="900" y="56" font-size="14" fill="#2a4747" font-weight="bold" text-anchor="middle">arxiv.org/abs/2211.02405</text>
  <line x1="80" y1="92" x2="1020" y2="92" stroke="#e8e2d6" stroke-width="1"/>

  <!-- ===== ROOT NODE ===== -->
  <rect x="430" y="112" width="240" height="44" rx="6" fill="#e8e2d6" stroke="#8a857a" stroke-width="1.5"/>
  <text x="550" y="139" font-size="16" fill="#1a1a1a" text-anchor="middle" font-weight="600">Explainable IR</text>

  <!-- ===== ROOT → LEVEL-1 trunk lines ===== -->
  <!-- root bottom to horizontal bar -->
  <line x1="550" y1="156" x2="550" y2="185" stroke="#8a857a" stroke-width="1.5"/>
  <line x1="180" y1="185" x2="920" y2="185" stroke="#8a857a" stroke-width="1.5"/>
  <!-- down to each L1 box -->
  <line x1="180" y1="185" x2="180" y2="210" stroke="#8a857a" stroke-width="1.5"/>
  <line x1="550" y1="185" x2="550" y2="210" stroke="#8a857a" stroke-width="1.5"/>
  <line x1="920" y1="185" x2="920" y2="210" stroke="#8a857a" stroke-width="1.5"/>

  <!-- ===== LEVEL-1 NODES ===== -->
  <!-- Post-hoc -->
  <rect x="80" y="210" width="200" height="44" rx="6" fill="#e8e2d6" stroke="#8a857a" stroke-width="1.5"/>
  <text x="180" y="237" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Post-hoc</text>

  <!-- Grounding to IR Properties -->
  <rect x="420" y="210" width="260" height="44" rx="6" fill="#e8e2d6" stroke="#8a857a" stroke-width="1.5"/>
  <text x="550" y="237" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Grounding to IR Properties</text>

  <!-- Interpretable by-design -->
  <rect x="810" y="210" width="220" height="44" rx="6" fill="#e8e2d6" stroke="#8a857a" stroke-width="1.5"/>
  <text x="920" y="237" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Interpretable by-design</text>

  <!-- ===== POST-HOC → L2 ===== -->
  <line x1="180" y1="254" x2="180" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="80" y1="278" x2="280" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="80" y1="278" x2="80" y2="298" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="180" y1="278" x2="180" y2="298" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="280" y1="278" x2="280" y2="298" stroke="#8a857a" stroke-width="1.3"/>

  <!-- Feature Attribution §3 -->
  <rect x="32" y="298" width="96" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="80" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Feature</text>
  <text x="80" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Attribution</text>
  <text x="80" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§3</text>

  <!-- Free-text Explanations §4 -->
  <rect x="132" y="298" width="96" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="180" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Free-text</text>
  <text x="180" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Explanations</text>
  <text x="180" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§4</text>

  <!-- Adversarial Examples §5 -->
  <rect x="232" y="298" width="96" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="280" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Adversarial</text>
  <text x="280" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Examples</text>
  <text x="280" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§5</text>

  <!-- ===== GROUNDING → L2 ===== -->
  <line x1="550" y1="254" x2="550" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="460" y1="278" x2="640" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="460" y1="278" x2="460" y2="298" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="640" y1="278" x2="640" y2="298" stroke="#8a857a" stroke-width="1.3"/>

  <!-- Axiomatic Analysis §6 -->
  <rect x="390" y="298" width="140" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="460" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Axiomatic</text>
  <text x="460" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Analysis</text>
  <text x="460" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§6</text>

  <!-- Probing §7 -->
  <rect x="570" y="298" width="140" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="640" y="323" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Probing</text>
  <text x="640" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§7</text>

  <!-- ===== INTERPRETABLE → L2 ===== -->
  <line x1="920" y1="254" x2="920" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="820" y1="278" x2="1020" y2="278" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="820" y1="278" x2="820" y2="298" stroke="#8a857a" stroke-width="1.3"/>
  <line x1="1020" y1="278" x2="1020" y2="298" stroke="#8a857a" stroke-width="1.3"/>

  <!-- Explainable Architectures §8 -->
  <rect x="745" y="298" width="150" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="820" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Explainable</text>
  <text x="820" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Architectures</text>
  <text x="820" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§8</text>

  <!-- Rationale-based Methods §9 -->
  <rect x="945" y="298" width="150" height="52" rx="5" fill="#ffffff" stroke="#2a4747" stroke-width="1.5"/>
  <text x="1020" y="318" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Rationale-based</text>
  <text x="1020" y="333" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="600">Methods</text>
  <text x="1020" y="347" font-size="11" fill="#2a4747" text-anchor="middle">§9</text>

  <!-- ===== EXAMPLE PAPERS BELOW L2 NODES ===== -->
  <!-- Feature Attribution examples -->
  <text x="80" y="372" font-size="9" fill="#6b665e" text-anchor="middle">EXS · Shap</text>
  <text x="80" y="383" font-size="9" fill="#6b665e" text-anchor="middle">for Rankings</text>
  <text x="80" y="396" font-size="9" fill="#c8553d" text-anchor="middle">[Singh et al. ’19, ’20]</text>

  <!-- Free-text examples -->
  <text x="180" y="372" font-size="9" fill="#6b665e" text-anchor="middle">Explaining</text>
  <text x="180" y="383" font-size="9" fill="#6b665e" text-anchor="middle">text rankers</text>
  <text x="180" y="396" font-size="9" fill="#c8553d" text-anchor="middle">[Singh &amp; Anand ’20]</text>
  <text x="180" y="408" font-size="9" fill="#c8553d" text-anchor="middle">[Lyu &amp; Anand ’23]</text>

  <!-- Adversarial examples -->
  <text x="280" y="372" font-size="9" fill="#6b665e" text-anchor="middle">BERT Rankers</text>
  <text x="280" y="383" font-size="9" fill="#6b665e" text-anchor="middle">are brittle</text>
  <text x="280" y="396" font-size="9" fill="#c8553d" text-anchor="middle">[Wang et al. ’22]</text>

  <!-- Axiomatic examples -->
  <text x="460" y="376" font-size="10" fill="#6b665e" text-anchor="middle">Axiomatic grounding</text>
  <text x="460" y="390" font-size="10" fill="#c8553d" text-anchor="middle">[Voelske et al. 2021]</text>

  <!-- Probing examples -->
  <text x="640" y="376" font-size="10" fill="#6b665e" text-anchor="middle">Probing BERT models</text>
  <text x="640" y="390" font-size="10" fill="#c8553d" text-anchor="middle">[Wallat et al. 2021, 23]</text>

  <!-- Rationale-based examples -->
  <text x="1020" y="376" font-size="10" fill="#6b665e" text-anchor="middle">Explain then Predict</text>
  <text x="1020" y="390" font-size="10" fill="#6b665e" text-anchor="middle">for KITS</text>
  <text x="1020" y="404" font-size="10" fill="#c8553d" text-anchor="middle">[Zhang, Rudra, Anand 2021]</text>

  <text x="1020" y="428" font-size="10" fill="#6b665e" text-anchor="middle">Learnt sparsity for</text>
  <text x="1020" y="442" font-size="10" fill="#6b665e" text-anchor="middle">text rankers</text>
  <text x="1020" y="456" font-size="10" fill="#c8553d" text-anchor="middle">[Leonhardt, Rudra, Anand 2021]</text>

  <!-- ===== FOOTER ===== -->
  <line x1="80" y1="500" x2="200" y2="500" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="526" font-size="15" fill="#1a1a1a">A unified taxonomy of explainability methods for retrieval and ranking systems.</text>
  <text x="80" y="546" font-size="14" fill="#6b665e" font-style="italic">From post-hoc feature attribution to interpretable-by-design architectures.</text>

</svg>
