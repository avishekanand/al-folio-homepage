    <circle cx="610" cy="475" r="5"/><circle cx="630" cy="475" r="5"/>
    <circle cx="650" cy="475" r="5"/><circle cx="670" cy="475" r="5"/>
    <circle cx="690" cy="475" r="5"/><circle cx="710" cy="475" r="5"/>
