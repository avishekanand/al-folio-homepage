<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <!-- ============================================================
       ORE FLOW — p. 30
       Pool of candidates with feature vectors → linear bandit
       → score top-b → observe ranker scores → update α
       → re-prioritize pool
       ============================================================ -->

  <defs>
    <marker id="arrowORE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowOREaccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    ORE — Online Relevance Estimation
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    A linear bandit learns which signals matter — per query, online
  </text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- ============================================================
       LEFT — CANDIDATE POOL with feature vectors
       Each document = a row: doc id + 4 small feature bars
       ============================================================ -->

  <text x="80" y="160" font-size="13" fill="#1a1a1a" font-weight="700" letter-spacing="0.5">
    CANDIDATE POOL
  </text>
  <text x="80" y="180" font-size="11" fill="#6b665e" font-style="italic">
    each doc carries a feature vector
  </text>

  <!-- Feature legend -->
  <g font-size="10" fill="#6b665e">
    <rect x="80" y="195" width="8" height="8" fill="#8a857a"/>
    <text x="93" y="203">BM25</text>
    <rect x="135" y="195" width="8" height="8" fill="#2a4747"/>
    <text x="148" y="203">dense</text>
    <rect x="190" y="195" width="8" height="8" fill="#c8553d"/>
    <text x="203" y="203">affinity</text>
    <rect x="248" y="195" width="8" height="8" fill="#b8b3a8"/>
    <text x="261" y="203">neighbor</text>
  </g>

  <!-- Pool box -->
  <rect x="70" y="220" width="320" height="380" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>

  <!-- Document rows. Each row: doc label + 4 feature bars of varying lengths -->
  <!-- Format: y, [bm25 width, dense width, affinity width, neighbor width], status
       status: "scored" = teal underline (already scored by ranker)
               "candidate" = neutral
               "selected" = orange highlight (about to be sent to ranker)  -->

  <!-- Row 1: scored (teal indicator) -->
  <g>
    <text x="85" y="247" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">1</tspan></text>
    <rect x="115" y="240" width="40" height="8" fill="#8a857a"/>
    <rect x="160" y="240" width="55" height="8" fill="#2a4747"/>
    <rect x="220" y="240" width="35" height="8" fill="#c8553d"/>
    <rect x="260" y="240" width="48" height="8" fill="#b8b3a8"/>
    <text x="320" y="247" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="252" x2="308" y2="252" stroke="#2a4747" stroke-width="1.5"/>

  <!-- Row 2: scored -->
  <g>
    <text x="85" y="277" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">2</tspan></text>
    <rect x="115" y="270" width="55" height="8" fill="#8a857a"/>
    <rect x="175" y="270" width="40" height="8" fill="#2a4747"/>
    <rect x="220" y="270" width="50" height="8" fill="#c8553d"/>
    <rect x="275" y="270" width="30" height="8" fill="#b8b3a8"/>
    <text x="320" y="277" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="282" x2="305" y2="282" stroke="#2a4747" stroke-width="1.5"/>

  <!-- Row 3: scored -->
  <g>
    <text x="85" y="307" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">3</tspan></text>
    <rect x="115" y="300" width="35" height="8" fill="#8a857a"/>
    <rect x="155" y="300" width="50" height="8" fill="#2a4747"/>
    <rect x="210" y="300" width="60" height="8" fill="#c8553d"/>
    <rect x="275" y="300" width="40" height="8" fill="#b8b3a8"/>
    <text x="320" y="307" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="312" x2="315" y2="312" stroke="#2a4747" stroke-width="1.5"/>

  <!-- divider: scored above, candidates below -->
  <line x1="80" y1="328" x2="380" y2="328" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="380" y="324" font-size="10" fill="#6b665e" text-anchor="end" font-style="italic">judged so far (b = 3)</text>

  <!-- Row 4: candidate -->
  <g>
    <text x="85" y="357" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">4</tspan></text>
    <rect x="115" y="350" width="50" height="8" fill="#8a857a"/>
    <rect x="170" y="350" width="45" height="8" fill="#2a4747"/>
    <rect x="220" y="350" width="40" height="8" fill="#c8553d"/>
    <rect x="265" y="350" width="55" height="8" fill="#b8b3a8"/>
  </g>

  <!-- Row 5: candidate -->
  <g>
    <text x="85" y="387" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">5</tspan></text>
    <rect x="115" y="380" width="30" height="8" fill="#8a857a"/>
    <rect x="150" y="380" width="35" height="8" fill="#2a4747"/>
    <rect x="190" y="380" width="55" height="8" fill="#c8553d"/>
    <rect x="250" y="380" width="40" height="8" fill="#b8b3a8"/>
  </g>

  <!-- Row 6: SELECTED (highlighted, will be sent to ranker next) -->
  <g>
    <rect x="78" y="404" width="304" height="22" fill="#c8553d" fill-opacity="0.12" rx="2"/>
    <text x="85" y="417" font-size="11" fill="#c8553d" font-family="Courier, monospace" font-weight="700">d<tspan font-size="9" baseline-shift="sub">6</tspan></text>
    <rect x="115" y="410" width="45" height="8" fill="#8a857a"/>
    <rect x="165" y="410" width="58" height="8" fill="#2a4747"/>
    <rect x="228" y="410" width="62" height="8" fill="#c8553d"/>
    <rect x="295" y="410" width="50" height="8" fill="#b8b3a8"/>
    <text x="350" y="417" font-size="10" fill="#c8553d" font-weight="700">▶ next</text>
  </g>

  <!-- Row 7: candidate -->
  <g>
    <text x="85" y="447" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">7</tspan></text>
    <rect x="115" y="440" width="40" height="8" fill="#8a857a"/>
    <rect x="160" y="440" width="30" height="8" fill="#2a4747"/>
    <rect x="195" y="440" width="35" height="8" fill="#c8553d"/>
    <rect x="235" y="440" width="60" height="8" fill="#b8b3a8"/>
  </g>

  <!-- Row 8: candidate -->
  <g>
    <text x="85" y="477" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">8</tspan></text>
    <rect x="115" y="470" width="35" height="8" fill="#8a857a"/>
    <rect x="155" y="470" width="40" height="8" fill="#2a4747"/>
    <rect x="200" y="470" width="30" height="8" fill="#c8553d"/>
    <rect x="235" y="470" width="48" height="8" fill="#b8b3a8"/>
  </g>

  <!-- ellipsis -->
  <text x="225" y="510" font-size="14" fill="#6b665e" text-anchor="middle">...</text>
  <text x="225" y="540" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">N candidates total</text>

  <!-- pool footer -->
  <line x1="80" y1="565" x2="380" y2="565" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="225" y="585" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">
    only a few will be sent to the expensive ranker
  </text>

  <!-- ============================================================
       CENTER — LINEAR BANDIT (the protagonist)
       Receives ranker scores from "scored" rows, updates α,
       computes UCB-style scores for unjudged candidates
       ============================================================ -->

  <g>
    <rect x="430" y="240" width="240" height="200" fill="#c8553d" stroke="#c8553d" stroke-width="2" rx="4"/>
    <text x="550" y="280" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="2">
      LINEAR BANDIT
    </text>
    <text x="550" y="304" font-size="12" fill="#ffffff" text-anchor="middle" font-style="italic" opacity="0.92">
      score(d) = αᵀφ(d)
    </text>

    <!-- α parameter vector visualization -->
    <line x1="455" y1="325" x2="645" y2="325" stroke="#ffffff" stroke-width="0.6" opacity="0.6"/>
    <text x="550" y="346" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="1" opacity="0.92">
      PARAMETERS  α
    </text>

    <!-- Mock alpha values -->
    <g font-size="11" fill="#ffffff" font-family="Courier, monospace">
      <text x="465" y="372">α_BM25</text>
      <rect x="540" y="365" width="40" height="6" fill="#ffffff" opacity="0.5"/>
      <text x="655" y="372" text-anchor="end" opacity="0.85">0.18</text>
    </g>
    <g font-size="11" fill="#ffffff" font-family="Courier, monospace">
      <text x="465" y="392">α_dense</text>
      <rect x="540" y="385" width="80" height="6" fill="#ffffff" opacity="0.85"/>
      <text x="655" y="392" text-anchor="end" opacity="0.95">0.42</text>
    </g>
    <g font-size="11" fill="#ffffff" font-family="Courier, monospace">
      <text x="465" y="412">α_aff</text>
      <rect x="540" y="405" width="62" height="6" fill="#ffffff" opacity="0.7"/>
      <text x="655" y="412" text-anchor="end" opacity="0.9">0.31</text>
    </g>
    <g font-size="11" fill="#ffffff" font-family="Courier, monospace">
      <text x="465" y="432">α_nbr</text>
      <rect x="540" y="425" width="20" height="6" fill="#ffffff" opacity="0.4"/>
      <text x="655" y="432" text-anchor="end" opacity="0.85">0.09</text>
    </g>
  </g>

  <!-- ============================================================
       RIGHT — EXPENSIVE RANKER
       ============================================================ -->

  <g>
    <rect x="730" y="280" width="220" height="120" fill="#ffffff" stroke="#2a4747" stroke-width="2.4" rx="4"/>
    <text x="840" y="318" font-size="15" fill="#2a4747" text-anchor="middle" font-weight="700">
      EXPENSIVE RANKER
    </text>
    <text x="840" y="343" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">
      cross-encoder /
    </text>
    <text x="840" y="358" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">
      RankLLaMA / etc.
    </text>
    <text x="840" y="384" font-size="11" fill="#2a4747" text-anchor="middle" font-weight="700" letter-spacing="0.5">
      ground-truth signal
    </text>
  </g>

  <!-- ============================================================
       FLOW ARROWS — two parallel channels
       Upper row (y=320): forward flow, solid black
         pool → bandit ("top-b")
         bandit → ranker ("to ranker")
       Lower row (y=380): feedback, dashed terracotta
         pool ← bandit ("re-rank")
         bandit ← ranker ("reward")
       Each arrow is a single straight segment with arrowhead landing
       cleanly on the destination box edge.
       Labels are kept short to fit between boxes (40-60px gaps).
       ============================================================ -->

  <!-- FORWARD ROW (y=320) -->

  <!-- pool → bandit -->
  <line x1="395" y1="320" x2="429" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowORE)"/>
  <text x="412" y="312" font-size="10" fill="#6b665e" text-anchor="middle" font-style="italic">top-b</text>

  <!-- bandit → ranker -->
  <line x1="675" y1="320" x2="729" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowORE)"/>
  <text x="702" y="312" font-size="10" fill="#6b665e" text-anchor="middle" font-style="italic">to rerank</text>

  <!-- FEEDBACK ROW (y=380), dashed terracotta, arrows reversed -->

  <!-- ranker → bandit (observed reward) -->
  <line x1="729" y1="380" x2="671" y2="380" stroke="#c8553d" stroke-width="2.4"
        stroke-dasharray="8,5" marker-end="url(#arrowOREaccent)"/>
  <text x="700" y="398" font-size="10" fill="#c8553d" text-anchor="middle" font-style="italic" font-weight="700">reward</text>

  <!-- bandit → pool (re-rank pool) -->
  <line x1="429" y1="380" x2="391" y2="380" stroke="#c8553d" stroke-width="2.4"
        stroke-dasharray="8,5" marker-end="url(#arrowOREaccent)"/>
  <text x="410" y="398" font-size="10" fill="#c8553d" text-anchor="middle" font-style="italic" font-weight="700">re-rank</text>

  <!-- ============================================================
       LEGEND for arrow conventions — placed below the bandit
       Explains what the two channels mean
       ============================================================ -->

  <g transform="translate(430 470)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#1a1a1a" stroke-width="2"/>
    <text x="28" y="4" font-size="11" fill="#6b665e" font-style="italic">forward — selection</text>

    <line x1="0" y1="20" x2="20" y2="20" stroke="#c8553d" stroke-width="2.4" stroke-dasharray="6,4"/>
    <text x="28" y="24" font-size="11" fill="#c8553d" font-style="italic">feedback — observed scores update α, re-prioritize pool</text>
  </g>

  <!-- ============================================================
       BOTTOM CALLOUT — what makes ORE different
       ============================================================ -->

  <line x1="80" y1="640" x2="200" y2="640" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="668" font-size="14" fill="#1a1a1a">
    The bandit doesn't just <tspan font-style="italic">pick</tspan> documents —
  </text>
  <text x="80" y="688" font-size="14" fill="#1a1a1a">
    it learns <tspan font-weight="700" fill="#c8553d">which features predict relevance for this query</tspan>.
  </text>

  <!-- the killer comparison -->
  <text x="700" y="668" font-size="12" fill="#6b665e" font-style="italic">
    QUAM, SUNAR: fixed signal structure
  </text>
  <text x="700" y="685" font-size="13" fill="#c8553d" font-weight="700">
    ORE: signal weights learned online, per query
  </text>
</svg>
