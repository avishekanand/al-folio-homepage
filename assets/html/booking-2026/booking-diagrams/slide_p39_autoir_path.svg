<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <!-- ============================================================
       AUTOIR PATH — p. 39
       Three stages: feedback (inner) → eval alignment → self-play (outer)
       Each stage gets a numbered token, a name, and 1-2 lines of text.
       Visual structure suggests "concentric loops": inner small,
       outer large.
       ============================================================ -->

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    A three-step path to AutoIR
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    Inner loop · bridge · outer loop
  </text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- ============================================================
       Three concentric circles, growing in size
       Each represents a "scope" — the algorithms operate within
       the inner loop; the outer loop wraps the whole system
       ============================================================ -->

  <g>
    <circle cx="550" cy="395" r="60" fill="none" stroke="#c8553d" stroke-width="2.5"/>
    <circle cx="550" cy="395" r="115" fill="none" stroke="#2a4747" stroke-width="2"/>
    <circle cx="550" cy="395" r="175" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-dasharray="8,5"/>
  </g>

  <!-- inner-loop center label -->
  <text x="550" y="385" font-size="14" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    INNER LOOP
  </text>
  <text x="550" y="403" font-size="11" fill="#c8553d" text-anchor="middle" font-style="italic">
    feedback drives
  </text>
  <text x="550" y="418" font-size="11" fill="#c8553d" text-anchor="middle" font-style="italic">
    optimization
  </text>

  <!-- middle ring label (placed at top of teal circle) -->
  <rect x="500" y="270" width="100" height="22" fill="#ffffff" stroke="none"/>
  <text x="550" y="285" font-size="13" fill="#2a4747" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    BRIDGE
  </text>

  <!-- outer-loop label (placed at top of outer dashed circle) -->
  <rect x="490" y="208" width="120" height="22" fill="#ffffff" stroke="none"/>
  <text x="550" y="223" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="1">
    OUTER LOOP
  </text>

  <!-- ============================================================
       Three step explanations — laid out around the diagram
       Step 1 (left): inner loop
       Step 2 (right): bridge / eval alignment
       Step 3 (bottom): outer loop / self-play
       ============================================================ -->

  <!-- Step 1: feedback / inner loop (LEFT) -->
  <g>
    <circle cx="120" cy="240" r="22" fill="#c8553d" stroke="#c8553d"/>
    <text x="120" y="248" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">1</text>
    <text x="160" y="232" font-size="18" fill="#1a1a1a" font-weight="700">Feedback</text>
    <text x="160" y="252" font-size="13" fill="#c8553d" font-style="italic" font-weight="600">the inner loop</text>
    <text x="160" y="278" font-size="13" fill="#1a1a1a">What feedback, and how to use</text>
    <text x="160" y="295" font-size="13" fill="#1a1a1a">it to improve and even construct</text>
    <text x="160" y="312" font-size="13" fill="#1a1a1a">RAG pipelines.</text>
    <text x="160" y="338" font-size="11" fill="#6b665e" font-style="italic">QUAM · SUNAR · ORE · CASE</text>
  </g>

  <!-- connector from step 1 to inner ring -->
  <line x1="280" y1="320" x2="490" y2="395" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- Step 2: eval alignment / bridge (RIGHT) -->
  <g>
    <circle cx="800" cy="240" r="22" fill="#2a4747" stroke="#2a4747"/>
    <text x="800" y="248" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">2</text>
    <text x="840" y="232" font-size="18" fill="#1a1a1a" font-weight="700">Evaluation alignment</text>
    <text x="840" y="252" font-size="13" fill="#2a4747" font-style="italic" font-weight="600">the bridge</text>
    <text x="840" y="278" font-size="13" fill="#1a1a1a">Auto-generated offline</text>
    <text x="840" y="295" font-size="13" fill="#1a1a1a">benchmarks aligned with</text>
    <text x="840" y="312" font-size="13" fill="#1a1a1a">online behavior.</text>
    <text x="840" y="338" font-size="11" fill="#6b665e" font-style="italic">LLM judges · click models</text>
  </g>

  <!-- connector from step 2 to teal ring -->
  <line x1="780" y1="320" x2="660" y2="395" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- Step 3: self-play / outer loop (BOTTOM) -->
  <g>
    <circle cx="120" cy="570" r="22" fill="#1a1a1a" stroke="#1a1a1a"/>
    <text x="120" y="578" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
    <text x="160" y="562" font-size="18" fill="#1a1a1a" font-weight="700">Self-play</text>
    <text x="160" y="582" font-size="13" fill="#1a1a1a" font-style="italic" font-weight="600">the outer loop</text>
    <text x="160" y="608" font-size="13" fill="#1a1a1a">The outer loop generates data from (2).</text>
    <text x="160" y="625" font-size="13" fill="#1a1a1a">The inner loop optimizes from (1).</text>
    <text x="160" y="650" font-size="13" fill="#c8553d" font-weight="700" font-style="italic">
      Together: a system that learns.
    </text>
  </g>

  <!-- connector from step 3 to outer ring -->
  <line x1="280" y1="595" x2="450" y2="540" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3,3"/>

  <!-- ============================================================
       FOOTER
       ============================================================ -->

  <line x1="780" y1="660" x2="900" y2="660" stroke="#c8553d" stroke-width="1.5"/>
  <text x="900" y="690" font-size="14" fill="#6b665e" font-style="italic" text-anchor="end">
    next: the self-play loop in detail
  </text>
</svg>
