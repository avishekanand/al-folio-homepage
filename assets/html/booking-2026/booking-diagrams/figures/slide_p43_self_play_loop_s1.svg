<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" font-family="Georgia, 'Times New Roman', serif" width="1100" height="480">
  <defs>
    <marker id="loopArrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1a1a1a"/>
    </marker>
    <marker id="loopArrowAccent" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c8553d"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  
  
  

  <!-- Background circle guide (dashed gray) -->
  <circle cx="550" cy="400" r="215" fill="none" stroke="#e8e2d6" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- NODE 3 — Inner loop (BOTTOM, primary, accent-filled, larger) -->
  <circle cx="550" cy="615" r="88" fill="#c8553d" stroke="#c8553d" stroke-width="2.4"/>
  <!-- badge placed ABOVE the circle -->
  <circle cx="550" cy="510" r="15" fill="#1a1a1a"/>
  <text x="550" y="515" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">3</text>
  <text x="550" y="600" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="0.5">INNER LOOP</text>
  <text x="550" y="617" font-size="11" fill="#ffffff" text-anchor="middle" font-style="italic" opacity="0.92">feedback-driven</text>
  <text x="550" y="632" font-size="11" fill="#ffffff" text-anchor="middle" font-style="italic" opacity="0.92">optimization</text>
  <!-- algorithm cluster -->
  <line x1="500" y1="645" x2="600" y2="645" stroke="#ffffff" stroke-width="0.8" opacity="0.5"/>
  <text x="550" y="664" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="0.6">
    ORE · SuNar · QUAM
  </text>
  <text x="550" y="680" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.85" letter-spacing="0.5">
    bandits
  </text>
</svg>
