<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">

  <rect width="1100" height="720" fill="#ffffff"/>

  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">The recall gap</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">Cascade pipeline vs. oracle — what is left on the table</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- background grid -->
  <g stroke="#e8e2d6" stroke-width="1">
    <line x1="130" y1="500" x2="880" y2="500"/>
    <line x1="130" y1="420" x2="880" y2="420"/>
    <line x1="130" y1="340" x2="880" y2="340"/>
    <line x1="130" y1="260" x2="880" y2="260"/>
    <line x1="130" y1="180" x2="880" y2="180"/>
    <line x1="309" y1="180" x2="309" y2="580" stroke-dasharray="2,4"/>
    <line x1="684" y1="180" x2="684" y2="580" stroke-dasharray="2,4"/>
  </g>

  <!-- gap fill: region between cascade and oracle (terracotta = the problem) -->
  <path d="M 130,444 L 242.9,388 L 355.8,340 L 446.9,296 L 505,268 L 571,248 L 654.2,232 L 730.8,220 L 796.8,212 L 880,204 L 880,332 L 796.8,344 L 730.8,356 L 654.2,372 L 571,392 L 505,412 L 446.9,432 L 355.8,456 L 242.9,484 L 130,508 Z"
        fill="#c8553d" fill-opacity="0.10"/>

  <!-- axes -->
  <line x1="130" y1="580" x2="880" y2="580" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="180" x2="130" y2="580" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- y ticks -->
  <g font-size="14" fill="#1a1a1a" text-anchor="end">
    <text x="118" y="585">0.0</text>
    <text x="118" y="505">0.2</text>
    <text x="118" y="425">0.4</text>
    <text x="118" y="345">0.6</text>
    <text x="118" y="265">0.8</text>
    <text x="118" y="185">1.0</text>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="125" y1="580" x2="130" y2="580"/>
    <line x1="125" y1="500" x2="130" y2="500"/>
    <line x1="125" y1="420" x2="130" y2="420"/>
    <line x1="125" y1="340" x2="130" y2="340"/>
    <line x1="125" y1="260" x2="130" y2="260"/>
    <line x1="125" y1="180" x2="130" y2="180"/>
  </g>
  <text x="60" y="380" font-size="16" fill="#1a1a1a" text-anchor="middle"
        transform="rotate(-90 60 380)" font-style="italic">Recall@k</text>

  <!-- x ticks -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="130" y1="580" x2="130" y2="585"/>
    <line x1="505" y1="580" x2="505" y2="585"/>
    <line x1="880" y1="580" x2="880" y2="585"/>
  </g>
  <g font-size="14" fill="#1a1a1a" text-anchor="middle">
    <text x="130" y="605">10</text>
    <text x="505" y="605">100</text>
    <text x="880" y="605">1000</text>
  </g>
  <text x="505" y="640" font-size="16" fill="#1a1a1a" text-anchor="middle" font-style="italic">k  (candidates retrieved, log scale)</text>

  <!-- Cascade curve (gray) -->
  <path d="M 130,508 L 242.9,484 L 355.8,456 L 446.9,432 L 505,412 L 571,392 L 654.2,372 L 730.8,356 L 796.8,344 L 880,332"
        stroke="#8a857a" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Oracle curve (teal, dashed) -->
  <path d="M 130,444 L 242.9,388 L 355.8,340 L 446.9,296 L 505,268 L 571,248 L 654.2,232 L 730.8,220 L 796.8,212 L 880,204"
        stroke="#2a4747" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="9,5"/>

  <!-- endpoint dots -->
  <circle cx="880" cy="332" r="4.5" fill="#8a857a"/>
  <circle cx="880" cy="204" r="4.5" fill="#2a4747"/>

  <!-- bracket at k=1000 showing the gap -->
  <g stroke="#c8553d" stroke-width="2" fill="none">
    <line x1="908" y1="204" x2="908" y2="332"/>
    <line x1="903" y1="204" x2="913" y2="204"/>
    <line x1="903" y1="332" x2="913" y2="332"/>
  </g>
  <text x="922" y="262" font-size="15" fill="#c8553d" font-weight="700">recall gap</text>
  <text x="922" y="280" font-size="12" fill="#6b665e" font-style="italic">≈ 0.32 at k=1000</text>

  <!-- curve labels -->
  <text x="648" y="380" font-size="15" fill="#6b665e" font-weight="600">Cascade</text>
  <text x="648" y="396" font-size="11" fill="#6b665e" font-style="italic">standard pipeline</text>

  <text x="370" y="288" font-size="15" fill="#2a4747" font-weight="600">Oracle</text>
  <text x="370" y="304" font-size="11" fill="#6b665e" font-style="italic">upper bound</text>

  <!-- gap label inside shaded region -->
  <text x="240" y="490" font-size="13" fill="#c8553d" font-style="italic" text-anchor="middle">what the cascade</text>
  <text x="240" y="508" font-size="13" fill="#c8553d" font-style="italic" text-anchor="middle">leaves unretrieved</text>

  <!-- footer -->
  <line x1="80" y1="666" x2="200" y2="666" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="693" font-size="16" fill="#1a1a1a">The cascade's recall is bounded by what the retriever surfaces.</text>
  <text x="80" y="713" font-size="15" fill="#6b665e" font-style="italic">The oracle shows how much is left — regardless of how good the reranker is.</text>

</svg>
