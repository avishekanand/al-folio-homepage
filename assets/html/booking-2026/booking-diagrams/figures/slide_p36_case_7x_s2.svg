<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" font-family="Georgia, 'Times New Roman', serif" width="1100" height="480">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  
  
  

  <!-- HEADLINE label -->
  <text x="80" y="220" font-size="14" fill="#c8553d" font-weight="700" letter-spacing="2">
    HEADLINE
  </text>

  <!-- Big 7x number -->
  <text x="80" y="380" font-size="200" fill="#c8553d" font-weight="700">
    7<tspan font-size="160" dx="-15">×</tspan>
  </text>
  <text x="80" y="425" font-size="22" fill="#1a1a1a" font-weight="700" letter-spacing="0.5">
    fewer LLM calls
  </text>
  <text x="80" y="455" font-size="16" fill="#6b665e" font-style="italic">
    same task performance
  </text>

  <!-- RIGHT SIDE -->
  <text x="600" y="220" font-size="14" fill="#1a1a1a" font-weight="700" letter-spacing="2">
    LLM CALLS PER QUERY
  </text>
  <text x="600" y="240" font-size="12" fill="#6b665e" font-style="italic">
    each ● = 10 expensive calls · same task, same final accuracy
  </text>

  <!-- classical baseline row -->
  <text x="600" y="290" font-size="13" fill="#6b665e" font-weight="600">classical baseline</text>

  <!-- 70 gray dots in 4 rows -->
