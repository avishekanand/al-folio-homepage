<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" width="1100" height="480" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar-fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="ar-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c8553d"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- TITLE -->
  
  
  

  <!-- LEFT: THE PERFECT LISTING CARD -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" font-size="13" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">QUERY</text>
    <text x="0" y="22" font-size="15" fill="#1a1a1a" font-style="italic">"romantic agriturismo</text>
    <text x="0" y="42" font-size="15" fill="#1a1a1a" font-style="italic">near Florence with a vineyard"</text>

    <!-- listing card -->
    <text x="0" y="92" font-size="13" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">THE PERFECT LISTING</text>
    <text x="0" y="110" font-size="11" fill="#6b665e" font-style="italic">exists in inventory · ranked #1,400 by first-stage</text>

    <rect x="0" y="124" width="280" height="180" rx="4" fill="#ffffff" stroke="#c8553d" stroke-width="1.6"/>
    <text x="14" y="148" font-size="13" fill="#1a1a1a" font-weight="bold">Casa di Lucia</text>
    <text x="14" y="166" font-size="11" fill="#6b665e" font-style="italic">listing description (truncated)</text>

    <line x1="14" y1="176" x2="266" y2="176" stroke="#e8e2d6" stroke-width="0.8"/>

    <text x="14" y="196" font-size="12" fill="#1a1a1a">"family-run estate in the</text>
    <text x="14" y="214" font-size="12" fill="#1a1a1a">Chianti hills, working winery,</text>
    <text x="14" y="232" font-size="12" fill="#1a1a1a">two-bedroom suite, terrace</text>
    <text x="14" y="250" font-size="12" fill="#1a1a1a">overlooking the vines…"</text>

    <text x="14" y="280" font-size="11" fill="#c8553d" font-style="italic">— never says "romantic"</text>
    <text x="14" y="296" font-size="11" fill="#c8553d" font-style="italic">— never says "agriturismo"</text>

    <!-- under-card label -->
    <text x="140" y="328" font-size="11" fill="#6b665e" font-style="italic" text-anchor="middle">vocabulary mismatch · BM25 misses · dense ranks #1,400</text>
  </g>

  <!-- CENTER: FIRST-STAGE RANK LADDER -->
  <g transform="translate(440, 170)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#1a1a1a" letter-spacing="0.5">FIRST-STAGE RANK</text>
    <text x="0" y="18" font-size="11" fill="#6b665e" font-style="italic">BM25 / dense over corpus</text>

    <!-- vertical rank container -->
    <rect x="0" y="36" width="220" height="430" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>

    <g font-family="Georgia, serif">
      <!-- header row -->
      <text x="14" y="62" font-size="11" fill="#6b665e" font-style="italic">rank</text>
      <text x="100" y="62" font-size="11" fill="#6b665e" font-style="italic">candidate</text>

      <!-- sample candidates near top -->
      <text x="14" y="86" font-size="11" fill="#1a1a1a">#1</text>
      <rect x="60" y="78" width="140" height="10" fill="#8a857a"/>

      <text x="14" y="106" font-size="11" fill="#1a1a1a">#2</text>
      <rect x="60" y="98" width="130" height="10" fill="#8a857a"/>

      <text x="14" y="126" font-size="11" fill="#1a1a1a">#3</text>
      <rect x="60" y="118" width="120" height="10" fill="#8a857a"/>

      <text x="14" y="146" font-size="11" fill="#1a1a1a">…</text>
      <text x="14" y="180" font-size="11" fill="#1a1a1a">#100</text>
      <rect x="60" y="172" width="80" height="10" fill="#8a857a"/>

      <text x="14" y="200" font-size="11" fill="#1a1a1a">…</text>
      <text x="14" y="232" font-size="11" fill="#1a1a1a">#1000</text>
      <rect x="60" y="224" width="50" height="10" fill="#8a857a"/>

      <!-- reranker cutoff line at y=36+244=280 absolute in group = y=170+244=414 absolute -->
      <line x1="0" y1="244" x2="220" y2="244" stroke="#c8553d" stroke-width="2" stroke-dasharray="9,5"/>
      <text x="220" y="260" font-size="11" fill="#c8553d" font-style="italic" font-weight="bold" text-anchor="end">reranker cutoff</text>

      <!-- below-cutoff candidates -->
      <text x="14" y="286" font-size="11" fill="#b8b3a8">#1001</text>
      <rect x="60" y="278" width="46" height="10" fill="#b8b3a8"/>

      <text x="14" y="306" font-size="11" fill="#b8b3a8">…</text>

      <!-- highlighted relevant doc (Casa di Lucia at #1400, row y=328 in group) -->
      <rect x="2" y="328" width="216" height="22" fill="#c8553d" fill-opacity="0.18"/>
      <text x="14" y="343" font-size="11" fill="#c8553d" font-weight="bold">#1400</text>
      <rect x="60" y="335" width="32" height="10" fill="#c8553d"/>
      <text x="100" y="343" font-size="11" fill="#c8553d" font-style="italic" font-weight="bold">Casa di Lucia</text>

      <text x="14" y="366" font-size="11" fill="#b8b3a8">…</text>
      <text x="14" y="386" font-size="11" fill="#b8b3a8">#5000</text>
      <rect x="60" y="378" width="22" height="10" fill="#b8b3a8"/>

      <text x="14" y="406" font-size="11" fill="#b8b3a8">…</text>

      <text x="110" y="442" font-size="11" fill="#6b665e" font-style="italic" text-anchor="middle">N candidates · sorted by lexical / dense score</text>
    </g>
  </g>
</svg>
