<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <marker id="arrBlack" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
    <marker id="arrMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a857a"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">Challenger-arm sampling — choosing a small subset of documents</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">Pick the most promising k-document subsets from a large retrieved pool</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- ===== RETRIEVED DOCUMENTS TEXT BOX (top-left) ===== -->
  <text x="60" y="170" font-size="13" font-weight="bold" fill="#1a1a1a">Retrieved Documents</text>
  <text x="60" y="190" font-size="12" fill="#8a857a" font-style="italic">d₁ : “Marriott London Bridge offers <tspan fill="#c8553d" font-weight="bold">city-centre rooms</tspan> …”</text>
  <text x="60" y="208" font-size="12" fill="#8a857a" font-style="italic">d₂ : “Boutique hotels with <tspan fill="#c8553d" font-weight="bold">romantic suites</tspan> near canals …”</text>

  <!-- ===== DOCUMENT POOL ellipse ===== -->
  <ellipse cx="175" cy="450" rx="130" ry="175" fill="#f0ece4" stroke="#8a857a" stroke-width="1.5"/>

  <!-- inner doc cluster top -->
  <ellipse cx="165" cy="320" rx="40" ry="30" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="155" cy="316" r="5" fill="#2a4747"/>
  <circle cx="172" cy="330" r="5" fill="#2a4747"/>
  <circle cx="180" cy="313" r="5" fill="#2a4747"/>
  <text x="165" y="298" font-size="11" fill="#1a1a1a" text-anchor="middle">d₂</text>
  <text x="148" y="312" font-size="10" fill="#6b665e" text-anchor="middle">d₀</text>
  <text x="188" y="326" font-size="10" fill="#6b665e" text-anchor="middle">d₁</text>
  <text x="135" y="360" font-size="10" fill="#6b665e">(...)</text>

  <!-- middle doc cluster -->
  <ellipse cx="175" cy="450" rx="38" ry="28" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="165" cy="445" r="5" fill="#2a4747"/>
  <circle cx="182" cy="458" r="5" fill="#2a4747"/>
  <circle cx="170" cy="462" r="5" fill="#2a4747"/>
  <text x="155" y="438" font-size="10" fill="#6b665e">d₆</text>
  <text x="185" y="462" font-size="10" fill="#6b665e">d₅</text>

  <!-- outer scattered docs -->
  <circle cx="110" cy="410" r="5" fill="#2a4747"/>
  <circle cx="130" cy="500" r="5" fill="#2a4747"/>
  <circle cx="200" cy="520" r="5" fill="#2a4747"/>
  <circle cx="220" cy="390" r="5" fill="#2a4747"/>
  <circle cx="145" cy="550" r="5" fill="#2a4747"/>
  <text x="98" y="408" font-size="10" fill="#6b665e" text-anchor="end">d₇</text>
  <text x="118" y="502" font-size="10" fill="#6b665e" text-anchor="end">d₄</text>
  <text x="207" y="535" font-size="10" fill="#6b665e">d₈</text>
  <text x="227" y="388" font-size="10" fill="#6b665e">d₃</text>

  <text x="175" y="632" font-size="13" fill="#6b665e" text-anchor="middle" font-style="italic">Retrieved document pool</text>

  <!-- arrow from text down to ellipse -->
  <line x1="175" y1="218" x2="175" y2="270" stroke="#8a857a" stroke-width="1.5" marker-end="url(#arrMuted)"/>

  <!-- ===== ARROW pool → U_sample ===== -->
  <line x1="308" y1="450" x2="358" y2="450" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrBlack)"/>

  <!-- ===== U (Sampling with replacement) box ===== -->
  <rect x="362" y="350" width="175" height="200" rx="14" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- subsets inside U_sample -->
  <ellipse cx="400" cy="392" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="393" cy="388" r="3.5" fill="#2a4747"/><circle cx="405" cy="398" r="3.5" fill="#2a4747"/><circle cx="410" cy="386" r="3.5" fill="#2a4747"/>
  <text x="392" y="378" font-size="10" fill="#6b665e">d₄</text><text x="413" y="380" font-size="10" fill="#6b665e">d₃</text>

  <ellipse cx="450" cy="392" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="443" cy="388" r="3.5" fill="#2a4747"/><circle cx="455" cy="398" r="3.5" fill="#2a4747"/><circle cx="460" cy="386" r="3.5" fill="#2a4747"/>
  <text x="441" y="378" font-size="10" fill="#6b665e">d₂</text>

  <text x="450" y="425" font-size="13" fill="#6b665e" text-anchor="middle">⋮</text>

  <ellipse cx="400" cy="468" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="393" cy="464" r="3.5" fill="#2a4747"/><circle cx="405" cy="474" r="3.5" fill="#2a4747"/>
  <text x="392" y="454" font-size="10" fill="#6b665e">d₇</text>

  <ellipse cx="450" cy="468" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="443" cy="464" r="3.5" fill="#2a4747"/><circle cx="455" cy="474" r="3.5" fill="#2a4747"/>
  <text x="441" y="454" font-size="10" fill="#6b665e">d₁</text><text x="460" y="478" font-size="10" fill="#6b665e">d₆</text>

  <text x="450" y="575" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="600">𝒰</text>
  <text x="450" y="592" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">(Sampling with</text>
  <text x="450" y="606" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">replacement)</text>

  <!-- ===== ARROW U_sample → scorer ===== -->
  <line x1="540" y1="450" x2="590" y2="450" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrBlack)"/>

  <!-- ===== SCORER box ===== -->
  <rect x="594" y="416" width="80" height="68" rx="6" fill="#b8e0b0" stroke="#5a9a50" stroke-width="1.8"/>
  <text x="634" y="446" font-size="14" fill="#1a1a1a" text-anchor="middle" font-style="italic">σ(α, .)</text>
  <text x="634" y="472" font-size="10" fill="#5a9a50" text-anchor="middle">scorer</text>

  <!-- ===== ARROW scorer → U_low_loss ===== -->
  <line x1="676" y1="450" x2="720" y2="450" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrBlack)"/>

  <!-- ===== U (Low-Loss subsets) box ===== -->
  <rect x="724" y="350" width="175" height="200" rx="14" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- subsets inside U_lowloss -->
  <ellipse cx="762" cy="392" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="755" cy="388" r="3.5" fill="#2a4747"/><circle cx="767" cy="398" r="3.5" fill="#2a4747"/><circle cx="772" cy="386" r="3.5" fill="#2a4747"/>
  <text x="753" y="378" font-size="10" fill="#6b665e">d₄</text><text x="774" y="380" font-size="10" fill="#6b665e">d₃</text>

  <ellipse cx="812" cy="392" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="805" cy="388" r="3.5" fill="#2a4747"/><circle cx="817" cy="398" r="3.5" fill="#2a4747"/><circle cx="822" cy="386" r="3.5" fill="#2a4747"/>
  <text x="803" y="378" font-size="10" fill="#6b665e">d₂</text>

  <text x="812" y="425" font-size="13" fill="#6b665e" text-anchor="middle">⋮</text>

  <ellipse cx="762" cy="468" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="755" cy="464" r="3.5" fill="#2a4747"/><circle cx="767" cy="474" r="3.5" fill="#2a4747"/>
  <text x="753" y="454" font-size="10" fill="#6b665e">d₇</text>

  <ellipse cx="812" cy="468" rx="22" ry="18" fill="none" stroke="#8a857a" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="805" cy="464" r="3.5" fill="#2a4747"/><circle cx="817" cy="474" r="3.5" fill="#2a4747"/>
  <text x="803" y="454" font-size="10" fill="#6b665e">d₁</text><text x="820" y="478" font-size="10" fill="#6b665e">d₆</text>

  <text x="812" y="575" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="600">U</text>
  <text x="812" y="592" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">(Low – Loss</text>
  <text x="812" y="606" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">document subsets)</text>

  <!-- ===== ARROW U_lowloss → reranker loss ===== -->
  <line x1="902" y1="450" x2="948" y2="450" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrBlack)"/>

  <!-- ===== RERANKER LOSS box ===== -->
  <rect x="952" y="416" width="100" height="68" rx="6" fill="#b8e0b0" stroke="#5a9a50" stroke-width="1.8"/>
  <text x="1002" y="444" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Reranker</text>
  <text x="1002" y="464" font-size="13" fill="#1a1a1a" text-anchor="middle">loss</text>

  <!-- ===== FEEDBACK ARC (loss → scorer) ===== -->
  <path d="M 1002,416 C 1002,270 634,270 634,416"
        fill="none" stroke="#c8553d" stroke-width="2" stroke-dasharray="6,3"
        marker-end="url(#arrRed)"/>
  <text x="818" y="258" font-size="12" fill="#c8553d" text-anchor="middle" font-style="italic">Approx. error based</text>
  <text x="818" y="275" font-size="12" fill="#c8553d" text-anchor="middle" font-style="italic">parameter update</text>

  <!-- footer caption -->
  <line x1="80" y1="668" x2="200" y2="668" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="694" font-size="14" fill="#1a1a1a" font-style="italic">Challenger-arm sampling efficiently picks the most promising k-document subsets — without scoring every subset.</text>
</svg>
