<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow-fwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- TITLE -->
  <text font-weight="bold" font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" fill="#1a1a1a">ReformIR — picking reformulations per query</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" fill="#6b665e" font-style="italic">Same bandit machinery as ORE — but the features are reformulations, not signals</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- LEFT COLUMN: REFORMULATOR -->
  <g transform="translate(80, 160)">
    <text x="0" y="14" font-size="13" font-weight="bold" fill="#1a1a1a" letter-spacing="0.5">REFORMULATOR</text>
    <text x="0" y="32" font-size="12" fill="#6b665e" font-style="italic">small LLM · cheap</text>
    <rect x="0" y="48" width="170" height="28" rx="14" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="14" y="67" font-size="12" fill="#1a1a1a" font-style="italic">Q: original query</text>
    <line x1="85" y1="80" x2="85" y2="96" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow-fwd)"/>
    <g font-size="11" fill="#1a1a1a">
      <rect x="0"   y="106" width="80" height="22" rx="11" fill="none" stroke="#8a857a" stroke-width="1"/>
      <text x="40"  y="121" text-anchor="middle">Q₁</text>
      <rect x="90"  y="106" width="80" height="22" rx="11" fill="none" stroke="#8a857a" stroke-width="1"/>
      <text x="130" y="121" text-anchor="middle">Q₂</text>
      <rect x="0"   y="134" width="80" height="22" rx="11" fill="none" stroke="#8a857a" stroke-width="1"/>
      <text x="40"  y="149" text-anchor="middle">Q₃</text>
      <rect x="90"  y="134" width="80" height="22" rx="11" fill="none" stroke="#8a857a" stroke-width="1"/>
      <text x="130" y="149" text-anchor="middle">Q₄</text>
    </g>
    <text x="0" y="174" font-size="11" fill="#6b665e" font-style="italic">m reformulations</text>
    <text x="0" y="190" font-size="11" fill="#6b665e" font-style="italic">BM25 retrieve each</text>
  </g>

  <!-- union arrow -->
  <line x1="252" y1="265" x2="288" y2="265" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#arrow-fwd)"/>
  <text x="270" y="257" text-anchor="middle" font-size="10" fill="#6b665e" font-style="italic">union</text>

  <!-- CANDIDATE POOL -->
  <g transform="translate(290, 180)">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#1a1a1a" letter-spacing="0.5">CANDIDATE POOL</text>
    <text x="0" y="18" font-size="12" fill="#6b665e" font-style="italic">each doc carries a feature vector over reformulations</text>

    <g font-size="10.5" fill="#6b665e">
      <rect x="0" y="30" width="10" height="10" fill="#8a857a"/>
      <text x="14" y="39">BM25(Q)</text>
      <rect x="76" y="30" width="10" height="10" fill="#2a4747"/>
      <text x="90" y="39">Q₁</text>
      <rect x="116" y="30" width="10" height="10" fill="#c8553d"/>
      <text x="130" y="39">Q₂</text>
      <rect x="156" y="30" width="10" height="10" fill="#b8b3a8"/>
      <text x="170" y="39">Q₃</text>
      <rect x="196" y="30" width="10" height="10" fill="#6b8a87"/>
      <text x="210" y="39">Q₄</text>
      <rect x="240" y="30" width="10" height="10" fill="#1a1a1a"/>
      <text x="254" y="39">RM3</text>
    </g>

    <rect x="0" y="55" width="320" height="335" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>

    <g font-size="11" fill="#1a1a1a">
      <text x="14" y="86">d₁</text>
      <rect x="36"  y="78" width="34" height="6" fill="#8a857a"/>
      <rect x="74"  y="78" width="42" height="6" fill="#2a4747"/>
      <rect x="120" y="78" width="22" height="6" fill="#c8553d"/>
      <rect x="146" y="78" width="30" height="6" fill="#b8b3a8"/>
      <rect x="180" y="78" width="18" height="6" fill="#6b8a87"/>
      <rect x="202" y="78" width="38" height="6" fill="#1a1a1a"/>
      <circle cx="266" cy="81" r="4" fill="#1a1a1a"/>
      <text x="276" y="84" font-size="10" fill="#6b665e">scored</text>

      <text x="14" y="112">d₂</text>
      <rect x="36"  y="104" width="40" height="6" fill="#8a857a"/>
      <rect x="80"  y="104" width="34" height="6" fill="#2a4747"/>
      <rect x="118" y="104" width="14" height="6" fill="#c8553d"/>
      <rect x="136" y="104" width="22" height="6" fill="#b8b3a8"/>
      <rect x="162" y="104" width="20" height="6" fill="#6b8a87"/>
      <rect x="186" y="104" width="32" height="6" fill="#1a1a1a"/>
      <circle cx="266" cy="107" r="4" fill="#1a1a1a"/>
      <text x="276" y="110" font-size="10" fill="#6b665e">scored</text>

      <text x="14" y="138">d₃</text>
      <rect x="36"  y="130" width="28" height="6" fill="#8a857a"/>
      <rect x="68"  y="130" width="40" height="6" fill="#2a4747"/>
      <rect x="112" y="130" width="32" height="6" fill="#c8553d"/>
      <rect x="148" y="130" width="20" height="6" fill="#b8b3a8"/>
      <rect x="172" y="130" width="14" height="6" fill="#6b8a87"/>
      <rect x="190" y="130" width="34" height="6" fill="#1a1a1a"/>
      <circle cx="266" cy="133" r="4" fill="#1a1a1a"/>
      <text x="276" y="136" font-size="10" fill="#6b665e">scored</text>

      <line x1="6" y1="153" x2="314" y2="153" stroke="#c8553d" stroke-width="1.2" stroke-dasharray="6,4"/>
      <text x="314" y="150" font-size="10.5" fill="#6b665e" font-style="italic" text-anchor="end">judged so far (b = 3)</text>

      <text x="14" y="178">d₄</text>
      <rect x="36"  y="170" width="22" height="6" fill="#8a857a"/>
      <rect x="62"  y="170" width="38" height="6" fill="#2a4747"/>
      <rect x="104" y="170" width="28" height="6" fill="#c8553d"/>
      <rect x="136" y="170" width="32" height="6" fill="#b8b3a8"/>
      <rect x="172" y="170" width="22" height="6" fill="#6b8a87"/>
      <rect x="198" y="170" width="28" height="6" fill="#1a1a1a"/>

      <text x="14" y="204">d₅</text>
      <rect x="36"  y="196" width="30" height="6" fill="#8a857a"/>
      <rect x="70"  y="196" width="22" height="6" fill="#2a4747"/>
      <rect x="96"  y="196" width="36" height="6" fill="#c8553d"/>
      <rect x="136" y="196" width="14" height="6" fill="#b8b3a8"/>
      <rect x="154" y="196" width="26" height="6" fill="#6b8a87"/>
      <rect x="184" y="196" width="22" height="6" fill="#1a1a1a"/>
      <text x="14" y="232">d₆</text>
      <rect x="36"  y="224" width="40" height="6" fill="#8a857a"/>
      <rect x="80"  y="224" width="46" height="6" fill="#2a4747"/>
      <rect x="130" y="224" width="40" height="6" fill="#c8553d"/>
      <rect x="174" y="224" width="18" height="6" fill="#b8b3a8"/>
      <rect x="196" y="224" width="22" height="6" fill="#6b8a87"/>
      <rect x="222" y="224" width="36" height="6" fill="#1a1a1a"/>
      <text x="14" y="260">d₇</text>
      <rect x="36"  y="252" width="32" height="6" fill="#8a857a"/>
      <rect x="72"  y="252" width="20" height="6" fill="#2a4747"/>
      <rect x="96"  y="252" width="14" height="6" fill="#c8553d"/>
      <rect x="114" y="252" width="36" height="6" fill="#b8b3a8"/>
      <rect x="154" y="252" width="20" height="6" fill="#6b8a87"/>
      <rect x="178" y="252" width="22" height="6" fill="#1a1a1a"/>

      <text x="14" y="286">d₈</text>
      <rect x="36"  y="278" width="26" height="6" fill="#8a857a"/>
      <rect x="66"  y="278" width="30" height="6" fill="#2a4747"/>
      <rect x="100" y="278" width="22" height="6" fill="#c8553d"/>
      <rect x="126" y="278" width="14" height="6" fill="#b8b3a8"/>
      <rect x="144" y="278" width="34" height="6" fill="#6b8a87"/>
      <rect x="182" y="278" width="20" height="6" fill="#1a1a1a"/>

      <text x="160" y="312" text-anchor="middle" font-size="14" fill="#6b665e">…</text>
      <text x="160" y="338" text-anchor="middle" font-size="11" fill="#6b665e" font-style="italic">N candidates total · union over Q, Q₁ … Q_m</text>
    </g>

    <line x1="0" y1="362" x2="320" y2="362" stroke="#e8e2d6" stroke-width="1"/>
    <text x="160" y="380" text-anchor="middle" font-size="11" fill="#6b665e" font-style="italic">teacher anchored to original Q · drift suppressed</text>
  </g>

  <!-- forward arrow: pool → bandit -->
  <line x1="614" y1="345" x2="654" y2="345" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow-fwd)"/>
  <text x="654" y="338" text-anchor="end" font-size="11" fill="#6b665e" font-style="italic">top-b</text>

  <!-- LINEAR BANDIT -->
  <g transform="translate(660, 255)">
    <rect x="0" y="0" width="220" height="235" rx="4" fill="#c8553d"/>
    <text x="110" y="32" text-anchor="middle" font-size="17" fill="#ffffff" font-weight="bold" letter-spacing="1.2">LINEAR BANDIT</text>
    <text x="110" y="56" text-anchor="middle" font-size="13" fill="#ffffff" font-style="italic">score(d) = w⊤ψ(d)</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="110" y="88" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold" letter-spacing="0.8">WEIGHTS  w</text>
    <g font-size="11" fill="#ffffff" font-family="Georgia, serif">
      <text x="20" y="115">w_Q</text>
      <rect x="76" y="108" width="80" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="115" text-anchor="end">0.36</text>
      <text x="20" y="138">w_Q₁</text>
      <rect x="76" y="131" width="64" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="138" text-anchor="end">0.28</text>
      <text x="20" y="161">w_Q₂</text>
      <rect x="76" y="154" width="48" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="161" text-anchor="end">0.21</text>
      <text x="20" y="184">w_Q₃</text>
      <rect x="76" y="177" width="6" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="184" text-anchor="end">0.01</text>
      <text x="20" y="207">w_Q₄</text>
      <rect x="76" y="200" width="22" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="207" text-anchor="end">0.07</text>
      <text x="20" y="226">w_RM3</text>
      <rect x="76" y="219" width="18" height="8" fill="#ffffff" fill-opacity="0.85"/>
      <text x="200" y="226" text-anchor="end">0.05</text>
    </g>
  </g>
</svg>
