    <circle cx="810" cy="335" r="5"/><circle cx="830" cy="335" r="5"/>
    <circle cx="850" cy="335" r="5"/><circle cx="870" cy="335" r="5"/>
    <circle cx="890" cy="335" r="5"/><circle cx="910" cy="335" r="5"/>
    <circle cx="930" cy="335" r="5"/><circle cx="950" cy="335" r="5"/>
    <circle cx="970" cy="335" r="5"/><circle cx="990" cy="335" r="5"/>
    <!-- Row 3 cy=355 -->
    <circle cx="610" cy="355" r="5"/><circle cx="630" cy="355" r="5"/>
    <circle cx="650" cy="355" r="5"/><circle cx="670" cy="355" r="5"/>
    <circle cx="690" cy="355" r="5"/><circle cx="710" cy="355" r="5"/>
