<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <!-- ============================================================
       CASCADING — BEAT 2: relevant doc dropped at retrieval (p. 11)
       Same layout as beat 1, but:
         - one extra teal "relevant" dot sits OUTSIDE the top-1000 box
         - red strike-through arrow indicates it never makes it to rerank
         - assumption callout becomes failure callout
       ============================================================ -->

  <defs>
    <marker id="arrowCB2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowDrop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    What if it doesn't?
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    Some relevant documents never enter the top-1000
  </text>
  <line x1="80" y1="128" x2="200" y2="128" stroke="#c8553d" stroke-width="1.5"/>

  <!-- pipeline (same geometry as beat 1) -->

  <!-- Query node -->
  <g>
    <circle cx="130" cy="320" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="130" y="316" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Query</text>
    <text x="130" y="335" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">q</text>
  </g>

  <!-- Retrieve box -->
  <g>
    <rect x="240" y="280" width="160" height="80" fill="#ffffff" stroke="#1a1a1a" stroke-width="2" rx="4"/>
    <text x="320" y="313" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Retrieve</text>
    <text x="320" y="335" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">embeddings</text>
  </g>

  <!-- top-1000 candidates box -->
  <rect x="430" y="225" width="280" height="190" fill="none" stroke="#6b665e" stroke-width="1" stroke-dasharray="4,4" rx="3"/>
  <text x="570" y="218" font-size="13" fill="#6b665e" text-anchor="middle" font-weight="600" letter-spacing="0.3">
    top-1000 candidates
  </text>

  <!-- candidate dots (same as beat 1) -->
  <g fill="#b8b3a8">
    <circle cx="450" cy="245" r="3.5"/><circle cx="472" cy="245" r="3.5"/>
    <circle cx="494" cy="245" r="3.5"/><circle cx="516" cy="245" r="3.5"/>
    <circle cx="538" cy="245" r="3.5"/><circle cx="560" cy="245" r="3.5"/>
    <circle cx="582" cy="245" r="3.5"/><circle cx="604" cy="245" r="3.5"/>
    <circle cx="626" cy="245" r="3.5"/><circle cx="648" cy="245" r="3.5"/>
    <circle cx="670" cy="245" r="3.5"/><circle cx="692" cy="245" r="3.5"/>
    <circle cx="450" cy="267" r="3.5"/><circle cx="472" cy="267" r="3.5"/>
    <circle cx="494" cy="267" r="3.5"/><circle cx="516" cy="267" r="3.5"/>
    <circle cx="538" cy="267" r="3.5"/><circle cx="560" cy="267" r="3.5"/>
    <circle cx="582" cy="267" r="3.5"/><circle cx="604" cy="267" r="3.5"/>
    <circle cx="626" cy="267" r="3.5"/><circle cx="648" cy="267" r="3.5"/>
    <circle cx="670" cy="267" r="3.5"/><circle cx="692" cy="267" r="3.5"/>
    <circle cx="450" cy="289" r="3.5"/><circle cx="472" cy="289" r="3.5"/>
    <circle cx="494" cy="289" r="3.5"/><circle cx="516" cy="289" r="3.5"/>
    <circle cx="538" cy="289" r="3.5"/><circle cx="560" cy="289" r="3.5"/>
    <circle cx="582" cy="289" r="3.5"/><circle cx="604" cy="289" r="3.5"/>
    <circle cx="626" cy="289" r="3.5"/><circle cx="648" cy="289" r="3.5"/>
    <circle cx="670" cy="289" r="3.5"/><circle cx="692" cy="289" r="3.5"/>
    <circle cx="450" cy="311" r="3.5"/><circle cx="472" cy="311" r="3.5"/>
    <circle cx="494" cy="311" r="3.5"/><circle cx="516" cy="311" r="3.5"/>
    <circle cx="538" cy="311" r="3.5"/><circle cx="560" cy="311" r="3.5"/>
    <circle cx="582" cy="311" r="3.5"/><circle cx="604" cy="311" r="3.5"/>
    <circle cx="626" cy="311" r="3.5"/><circle cx="648" cy="311" r="3.5"/>
    <circle cx="670" cy="311" r="3.5"/><circle cx="692" cy="311" r="3.5"/>
    <circle cx="450" cy="333" r="3.5"/><circle cx="472" cy="333" r="3.5"/>
    <circle cx="494" cy="333" r="3.5"/><circle cx="516" cy="333" r="3.5"/>
    <circle cx="538" cy="333" r="3.5"/><circle cx="560" cy="333" r="3.5"/>
    <circle cx="582" cy="333" r="3.5"/><circle cx="604" cy="333" r="3.5"/>
    <circle cx="626" cy="333" r="3.5"/><circle cx="648" cy="333" r="3.5"/>
    <circle cx="670" cy="333" r="3.5"/><circle cx="692" cy="333" r="3.5"/>
    <circle cx="450" cy="355" r="3.5"/><circle cx="472" cy="355" r="3.5"/>
    <circle cx="494" cy="355" r="3.5"/><circle cx="516" cy="355" r="3.5"/>
    <circle cx="538" cy="355" r="3.5"/><circle cx="560" cy="355" r="3.5"/>
    <circle cx="582" cy="355" r="3.5"/><circle cx="604" cy="355" r="3.5"/>
    <circle cx="626" cy="355" r="3.5"/><circle cx="648" cy="355" r="3.5"/>
    <circle cx="670" cy="355" r="3.5"/><circle cx="692" cy="355" r="3.5"/>
  </g>

  <!-- relevant docs INSIDE the pool (same as beat 1) -->
  <g fill="#2a4747">
    <circle cx="494" cy="267" r="4.5"/>
    <circle cx="582" cy="311" r="4.5"/>
    <circle cx="648" cy="333" r="4.5"/>
    <circle cx="538" cy="355" r="4.5"/>
  </g>

  <!-- THE DROPPED RELEVANT DOC — outside the box, top-right area -->
  <g>
    <!-- pulse ring around it for emphasis -->
    <circle cx="780" cy="180" r="14" fill="none" stroke="#c8553d" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
    <circle cx="780" cy="180" r="6" fill="#c8553d"/>
  </g>

  <!-- callout label for the dropped doc -->
  <line x1="800" y1="180" x2="850" y2="160" stroke="#c8553d" stroke-width="1"/>
  <text x="855" y="155" font-size="13" fill="#c8553d" font-weight="700">a relevant document</text>
  <text x="855" y="172" font-size="13" fill="#c8553d" font-style="italic">the retriever ranks #1247</text>
  <text x="855" y="189" font-size="12" fill="#6b665e" font-style="italic">→ never enters the pool</text>

  <!-- pool legend - BELOW the box -->
  <g font-size="11" fill="#6b665e" font-style="italic">
    <circle cx="438" cy="436" r="3.5" fill="#b8b3a8"/>
    <text x="450" y="440">retrieved</text>
    <circle cx="512" cy="436" r="4.5" fill="#2a4747"/>
    <text x="522" y="440" fill="#2a4747">relevant</text>
  </g>

  <text x="700" y="440" font-size="11" fill="#6b665e" text-anchor="end" font-style="italic">top-10 → rerank</text>

  <!-- Rerank box -->
  <g>
    <rect x="740" y="280" width="140" height="80" fill="#ffffff" stroke="#1a1a1a" stroke-width="2" rx="4"/>
    <text x="810" y="313" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Rerank</text>
    <text x="810" y="335" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">deep, slow</text>
  </g>

  <!-- Generate box -->
  <g>
    <rect x="920" y="280" width="130" height="80" fill="#ffffff" stroke="#1a1a1a" stroke-width="2" rx="4"/>
    <text x="985" y="313" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="600">Generate</text>
    <text x="985" y="335" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">answer</text>
  </g>

  <!-- flow arrows -->
  <line x1="180" y1="320" x2="234" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowCB2)"/>
  <line x1="402" y1="320" x2="424" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowCB2)"/>
  <line x1="712" y1="320" x2="734" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowCB2)"/>
  <line x1="882" y1="320" x2="914" y2="320" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrowCB2)"/>

  <!-- BLOCKED ARROW: from the dropped doc, attempting to reach rerank, but cut -->
  <!-- A red dashed arrow that ends in an X marker before reaching rerank -->
  <line x1="788" y1="195" x2="800" y2="245" stroke="#c8553d" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- X-mark blocking the path -->
  <g stroke="#c8553d" stroke-width="2.5" stroke-linecap="round">
    <line x1="794" y1="251" x2="806" y2="263"/>
    <line x1="806" y1="251" x2="794" y2="263"/>
  </g>

  <!-- failure callout -->
  <line x1="80" y1="490" x2="200" y2="490" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="520" font-size="15" fill="#c8553d" font-style="italic" letter-spacing="0.3" font-weight="700">THE FAILURE MODE</text>

  <text x="80" y="555" font-size="20" fill="#1a1a1a">
    The reranker can <tspan font-weight="700">only re-order what it's given.</tspan>
  </text>
  <text x="80" y="585" font-size="20" fill="#1a1a1a">
    If the right answer isn't in the top-1000 — it can't recover it.
  </text>

  <line x1="80" y1="660" x2="200" y2="660" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="80" y="693" font-size="17" fill="#1a1a1a" font-style="italic">
    Industry has accepted this as a cost of doing business.
  </text>
</svg>
