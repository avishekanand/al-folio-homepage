<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    CASE — pruning the comparison space
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    Why the same statistical guarantees can be achieved with far less work
  </text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- vertical divider -->
  <line x1="555" y1="150" x2="555" y2="600" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4,5"/>

  <!-- LEFT panel title -->
  <text x="270" y="160" font-size="16" fill="#6b665e" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    CLASSICAL · LinGapE / LinGIFA
  </text>
  <text x="270" y="180" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">
    every top-m arm compared to every other arm
  </text>

  <!-- LEFT U_t ellipse -->
  <ellipse cx="120" cy="380" rx="50" ry="120" fill="#2a4747" fill-opacity="0.07" stroke="#2a4747" stroke-width="1.5"/>
  <text x="120" y="245" font-size="13" fill="#2a4747" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    U<tspan font-size="9" baseline-shift="sub">t</tspan>
  </text>
  <text x="120" y="262" font-size="10" fill="#6b665e" text-anchor="middle" font-style="italic">
    top-m
  </text>
  <g fill="#2a4747">
    <circle cx="120" cy="320" r="6"/>
    <circle cx="120" cy="355" r="6"/>
    <circle cx="120" cy="395" r="6"/>
    <circle cx="120" cy="435" r="6"/>
  </g>

  <!-- LEFT complement ellipse -->
  <ellipse cx="400" cy="380" rx="115" ry="140" fill="#b8b3a8" fill-opacity="0.15" stroke="#6b665e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="400" y="225" font-size="13" fill="#6b665e" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    U<tspan font-size="9" baseline-shift="sub">t</tspan><tspan font-size="11" baseline-shift="super">c</tspan>
  </text>
  <text x="400" y="245" font-size="10" fill="#6b665e" text-anchor="middle" font-style="italic">
    complement (huge)
  </text>
  <g fill="#8a857a">
    <circle cx="340" cy="280" r="4"/><circle cx="380" cy="290" r="4"/>
    <circle cx="420" cy="280" r="4"/><circle cx="460" cy="295" r="4"/>
    <circle cx="350" cy="320" r="4"/><circle cx="390" cy="315" r="4"/>
    <circle cx="430" cy="320" r="4"/><circle cx="470" cy="325" r="4"/>
    <circle cx="335" cy="355" r="4"/><circle cx="375" cy="350" r="4"/>
    <circle cx="415" cy="355" r="4"/><circle cx="455" cy="355" r="4"/>
    <circle cx="495" cy="355" r="4"/>
    <circle cx="340" cy="385" r="4"/><circle cx="380" cy="385" r="4"/>
    <circle cx="420" cy="380" r="4"/><circle cx="460" cy="385" r="4"/>
    <circle cx="495" cy="390" r="4"/>
    <circle cx="335" cy="415" r="4"/><circle cx="375" cy="415" r="4"/>
    <circle cx="415" cy="415" r="4"/><circle cx="455" cy="420" r="4"/>
    <circle cx="495" cy="420" r="4"/>
    <circle cx="345" cy="450" r="4"/><circle cx="385" cy="455" r="4"/>
    <circle cx="425" cy="450" r="4"/><circle cx="465" cy="455" r="4"/>
    <circle cx="350" cy="485" r="4"/><circle cx="390" cy="490" r="4"/>
    <circle cx="430" cy="490" r="4"/><circle cx="470" cy="485" r="4"/>
  </g>
  <g stroke="#c8553d" stroke-width="0.5" stroke-opacity="0.35">
    <line x1="126" y1="320" x2="340" y2="280"/>
    <line x1="126" y1="320" x2="380" y2="290"/>
    <line x1="126" y1="320" x2="420" y2="280"/>
    <line x1="126" y1="320" x2="350" y2="320"/>
    <line x1="126" y1="320" x2="390" y2="315"/>
    <line x1="126" y1="320" x2="430" y2="320"/>
    <line x1="126" y1="320" x2="335" y2="355"/>
    <line x1="126" y1="320" x2="495" y2="355"/>
    <line x1="126" y1="320" x2="375" y2="385"/>
    <line x1="126" y1="320" x2="455" y2="420"/>
    <line x1="126" y1="355" x2="340" y2="280"/>
    <line x1="126" y1="355" x2="420" y2="280"/>
    <line x1="126" y1="355" x2="350" y2="320"/>
    <line x1="126" y1="355" x2="430" y2="320"/>
    <line x1="126" y1="355" x2="375" y2="350"/>
    <line x1="126" y1="355" x2="455" y2="355"/>
    <line x1="126" y1="355" x2="495" y2="390"/>
    <line x1="126" y1="355" x2="385" y2="455"/>
    <line x1="126" y1="355" x2="465" y2="455"/>
    <line x1="126" y1="395" x2="380" y2="290"/>
    <line x1="126" y1="395" x2="460" y2="295"/>
    <line x1="126" y1="395" x2="390" y2="315"/>
    <line x1="126" y1="395" x2="470" y2="325"/>
    <line x1="126" y1="395" x2="335" y2="355"/>
    <line x1="126" y1="395" x2="415" y2="355"/>
    <line x1="126" y1="395" x2="380" y2="385"/>
    <line x1="126" y1="395" x2="495" y2="390"/>
    <line x1="126" y1="395" x2="345" y2="450"/>
    <line x1="126" y1="395" x2="425" y2="450"/>
    <line x1="126" y1="395" x2="430" y2="490"/>
    <line x1="126" y1="435" x2="420" y2="280"/>
    <line x1="126" y1="435" x2="350" y2="320"/>
    <line x1="126" y1="435" x2="390" y2="315"/>
    <line x1="126" y1="435" x2="455" y2="355"/>
    <line x1="126" y1="435" x2="375" y2="350"/>
    <line x1="126" y1="435" x2="495" y2="355"/>
    <line x1="126" y1="435" x2="380" y2="385"/>
    <line x1="126" y1="435" x2="455" y2="420"/>
    <line x1="126" y1="435" x2="345" y2="450"/>
    <line x1="126" y1="435" x2="385" y2="455"/>
    <line x1="126" y1="435" x2="465" y2="455"/>
    <line x1="126" y1="435" x2="350" y2="485"/>
    <line x1="126" y1="435" x2="430" y2="490"/>
    <line x1="126" y1="435" x2="470" y2="485"/>
  </g>

  <!-- RIGHT panel title -->
  <text x="830" y="160" font-size="16" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    CASE · OUR APPROACH
  </text>
  <text x="830" y="180" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">
    each top-m arm compared only to a challenger shortlist
  </text>

  <!-- RIGHT U_t ellipse -->
  <ellipse cx="680" cy="380" rx="50" ry="120" fill="#2a4747" fill-opacity="0.07" stroke="#2a4747" stroke-width="1.5"/>
  <text x="680" y="245" font-size="13" fill="#2a4747" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    U<tspan font-size="9" baseline-shift="sub">t</tspan>
  </text>
  <text x="680" y="262" font-size="10" fill="#6b665e" text-anchor="middle" font-style="italic">
    top-m
  </text>
  <g fill="#2a4747">
    <circle cx="680" cy="320" r="6"/>
    <circle cx="680" cy="355" r="6"/>
    <circle cx="680" cy="395" r="6"/>
    <circle cx="680" cy="435" r="6"/>
  </g>

  <!-- RIGHT N_t challenger ellipse -->
  <ellipse cx="850" cy="380" rx="38" ry="100" fill="#c8553d" fill-opacity="0.1" stroke="#c8553d" stroke-width="2"/>
  <text x="850" y="248" font-size="13" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
