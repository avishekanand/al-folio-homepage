<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    ORE — speedup and recall, both at once
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    Hybrid retrieval and adaptive retrieval, in one framework
  </text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- vertical divider -->
  <line x1="540" y1="170" x2="540" y2="600" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4,5"/>

  <!-- LEFT PANEL header -->
  <text x="290" y="180" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    SPEEDUP OVER QUAM
  </text>
  <text x="290" y="200" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">
    same recall, fewer reranker calls
  </text>

  <!-- background grid -->
  <g stroke="#e8e2d6" stroke-width="1">
    <line x1="130" y1="510" x2="460" y2="510"/>
    <line x1="130" y1="450" x2="460" y2="450"/>
    <line x1="130" y1="390" x2="460" y2="390"/>
    <line x1="130" y1="330" x2="460" y2="330"/>
    <line x1="130" y1="270" x2="460" y2="270"/>
  </g>

  <!-- axes -->
  <line x1="130" y1="510" x2="460" y2="510" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="240" x2="130" y2="510" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- y-axis ticks -->
  <g font-size="12" fill="#1a1a1a" text-anchor="end">
    <text x="120" y="514">1×</text>
    <text x="120" y="454">3×</text>
    <text x="120" y="394">5×</text>
    <text x="120" y="334">7×</text>
    <text x="120" y="274">9×</text>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.2">
    <line x1="125" y1="510" x2="130" y2="510"/>
    <line x1="125" y1="450" x2="130" y2="450"/>
    <line x1="125" y1="390" x2="130" y2="390"/>
    <line x1="125" y1="330" x2="130" y2="330"/>
    <line x1="125" y1="270" x2="130" y2="270"/>
  </g>

  <!-- Cross-encoder bar : 2× -->
  <rect x="200" y="480" width="80" height="30" fill="#c8553d" stroke="#c8553d"/>
  <text x="240" y="472" font-size="22" fill="#c8553d" text-anchor="middle" font-weight="700">2×</text>
  <text x="240" y="535" font-size="13" fill="#1a1a1a" text-anchor="middle">cross-encoder</text>
  <text x="240" y="552" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">reranker</text>

  <!-- LLM/RankLLaMA bar : 9× -->
  <rect x="340" y="270" width="80" height="240" fill="#c8553d" stroke="#c8553d"/>
  <text x="380" y="262" font-size="32" fill="#c8553d" text-anchor="middle" font-weight="700">9×</text>
  <text x="380" y="535" font-size="13" fill="#1a1a1a" text-anchor="middle">LLM reranker</text>
  <text x="380" y="552" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">(RankLLaMA)</text>
</svg>
