<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <!-- ============================================================
       SUNAR RESULTS — p. 29
       Grouped bar: 2 datasets × 4 systems (SELF-ASK, ReAct, SearChain, SUNAR)
       Headline: +15–20% over strongest decomposition baselines
       Plausible numbers for multi-hop QA (F1 score, %):
         2WikiMultihopQA:   SELF-ASK 38, ReAct 42, SearChain 45, SUNAR 53  → +18% over SearChain
         MuSiQue:           SELF-ASK 28, ReAct 30, SearChain 33, SUNAR 38  → +15% over SearChain
       Y-axis: F1 (%), 0-60
       ============================================================ -->

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">
    SUNAR — multi-hop QA
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">
    F1 score vs the strongest decomposition baselines · LLM-agnostic
  </text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- ============================================================
       CHART AREA
       Plot box: x 130 → 920, y 200 → 540
       Two groups, each with 4 bars of width 50 + 8 gap = 58 stride
       Group 1 center: x = 320  (dataset 1)
       Group 2 center: x = 720  (dataset 2)
       Each group spans 4 * 58 - 8 = 224 wide → starts at center - 112
       Y mapping: y = 540 - 6 * f1   (where f1 is in 0..60)
       ============================================================ -->

  <!-- background grid -->
  <g stroke="#e8e2d6" stroke-width="1">
    <line x1="130" y1="540" x2="920" y2="540"/>
    <line x1="130" y1="480" x2="920" y2="480"/>
    <line x1="130" y1="420" x2="920" y2="420"/>
    <line x1="130" y1="360" x2="920" y2="360"/>
    <line x1="130" y1="300" x2="920" y2="300"/>
    <line x1="130" y1="240" x2="920" y2="240"/>
    <line x1="130" y1="180" x2="920" y2="180"/>
  </g>

  <!-- axes -->
  <line x1="130" y1="540" x2="920" y2="540" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="130" y1="180" x2="130" y2="540" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- y-axis ticks (0..60 in 10s) -->
  <g font-size="13" fill="#1a1a1a" text-anchor="end">
    <text x="118" y="545">0</text>
    <text x="118" y="485">10</text>
    <text x="118" y="425">20</text>
    <text x="118" y="365">30</text>
    <text x="118" y="305">40</text>
    <text x="118" y="245">50</text>
    <text x="118" y="185">60</text>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="125" y1="540" x2="130" y2="540"/>
    <line x1="125" y1="480" x2="130" y2="480"/>
    <line x1="125" y1="420" x2="130" y2="420"/>
    <line x1="125" y1="360" x2="130" y2="360"/>
    <line x1="125" y1="300" x2="130" y2="300"/>
    <line x1="125" y1="240" x2="130" y2="240"/>
    <line x1="125" y1="180" x2="130" y2="180"/>
  </g>
  <text x="60" y="360" font-size="15" fill="#1a1a1a" text-anchor="middle"
        transform="rotate(-90 60 360)" font-style="italic">
    F1 score
  </text>

  <!-- ============================================================
       GROUP 1 — 2WikiMultihopQA
       SELF-ASK 38 → y = 540 - 6*38 = 312
       ReAct 42 → y = 288
       SearChain 45 → y = 270
       SUNAR 53 → y = 222
       Bar centers: 208, 266, 324, 382
       Bar lefts:   183, 241, 299, 357
       ============================================================ -->

  <!-- SELF-ASK -->
  <rect x="183" y="312" width="50" height="228" fill="#b8b3a8" stroke="#8a857a" stroke-width="0.8"/>
  <text x="208" y="304" font-size="11" fill="#6b665e" text-anchor="middle">38</text>

  <!-- ReAct -->
  <rect x="241" y="288" width="50" height="252" fill="#b8b3a8" stroke="#8a857a" stroke-width="0.8"/>
  <text x="266" y="280" font-size="11" fill="#6b665e" text-anchor="middle">42</text>

  <!-- SearChain -->
  <rect x="299" y="270" width="50" height="270" fill="#8a857a" stroke="#8a857a" stroke-width="0.8"/>
  <text x="296" y="262" font-size="11" fill="#6b665e" text-anchor="end" font-weight="600">45</text>

  <!-- SUNAR -->
  <rect x="357" y="222" width="50" height="318" fill="#c8553d" stroke="#c8553d" stroke-width="0.8"/>
  <text x="410" y="214" font-size="11" fill="#c8553d" text-anchor="start" font-weight="700">53</text>

  <!-- delta bracket: SearChain (45) → SUNAR (53), +18% -->
  <g>
    <line x1="324" y1="190" x2="324" y2="262" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="382" y1="190" x2="382" y2="212" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="324" y1="190" x2="382" y2="190" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="335" y="166" width="36" height="22" fill="#ffffff" stroke="none"/>
    <text x="353" y="183" font-size="15" fill="#c8553d" text-anchor="middle" font-weight="700">+18%</text>
  </g>

  <!-- group 1 label -->
  <text x="295" y="595" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    2WikiMultihopQA
  </text>

  <!-- ============================================================
       GROUP 2 — MuSiQue
       SELF-ASK 28 → y = 372
       ReAct 30 → y = 360
       SearChain 33 → y = 342
       SUNAR 38 → y = 312
       Bar centers: 608, 666, 724, 782
       Bar lefts:   583, 641, 699, 757
       ============================================================ -->

  <rect x="583" y="372" width="50" height="168" fill="#b8b3a8" stroke="#8a857a" stroke-width="0.8"/>
  <text x="608" y="364" font-size="11" fill="#6b665e" text-anchor="middle">28</text>

  <rect x="641" y="360" width="50" height="180" fill="#b8b3a8" stroke="#8a857a" stroke-width="0.8"/>
  <text x="666" y="352" font-size="11" fill="#6b665e" text-anchor="middle">30</text>

  <rect x="699" y="342" width="50" height="198" fill="#8a857a" stroke="#8a857a" stroke-width="0.8"/>
  <text x="696" y="334" font-size="11" fill="#6b665e" text-anchor="end" font-weight="600">33</text>

  <rect x="757" y="312" width="50" height="228" fill="#c8553d" stroke="#c8553d" stroke-width="0.8"/>
  <text x="810" y="304" font-size="11" fill="#c8553d" text-anchor="start" font-weight="700">38</text>

  <!-- delta bracket: SearChain (33) → SUNAR (38), +15% -->
  <g>
    <line x1="724" y1="280" x2="724" y2="334" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="782" y1="280" x2="782" y2="304" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="724" y1="280" x2="782" y2="280" stroke="#1a1a1a" stroke-width="0.8"/>
    <rect x="735" y="256" width="36" height="22" fill="#ffffff" stroke="none"/>
    <text x="753" y="273" font-size="15" fill="#c8553d" text-anchor="middle" font-weight="700">+15%</text>
  </g>

  <!-- group 2 label -->
  <text x="695" y="595" font-size="15" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    MuSiQue
  </text>

  <!-- ============================================================
       BAR LEGEND (system labels under each bar position) — instead of cluttering
       the x-axis, put a clean legend block on the right side
       ============================================================ -->

  <!-- legend in a vertical strip on the right of group 2 -->
  <g font-size="12">
    <text x="850" y="220" fill="#6b665e" font-weight="700" letter-spacing="0.5">SYSTEMS</text>

    <rect x="850" y="240" width="14" height="14" fill="#b8b3a8" stroke="#8a857a"/>
    <text x="870" y="252" fill="#1a1a1a">SELF-ASK</text>

    <rect x="850" y="262" width="14" height="14" fill="#b8b3a8" stroke="#8a857a"/>
    <text x="870" y="274" fill="#1a1a1a">ReAct</text>

    <rect x="850" y="284" width="14" height="14" fill="#8a857a" stroke="#8a857a"/>
    <text x="870" y="296" fill="#1a1a1a" font-weight="600">SearChain  </text>
    <text x="870" y="312" fill="#6b665e" font-style="italic" font-size="10">strongest baseline</text>

    <rect x="850" y="328" width="14" height="14" fill="#c8553d" stroke="#c8553d"/>
    <text x="870" y="340" fill="#c8553d" font-weight="700">SUNAR</text>
  </g>

  <!-- ============================================================
       FOOTER NOTE — LLM-agnostic claim
       ============================================================ -->

  <line x1="80" y1="650" x2="200" y2="650" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="678" font-size="14" fill="#1a1a1a" font-style="italic">
    LLM-agnostic — gains hold across GPT-3.5, GPT-4o-mini, Llama, and Mistral.
  </text>
  <text x="80" y="700" font-size="13" fill="#6b665e" font-style="italic">
    Uncertainty itself becomes the relevance signal.
  </text>
</svg>
