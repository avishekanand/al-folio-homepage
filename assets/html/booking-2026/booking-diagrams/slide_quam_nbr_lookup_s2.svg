<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrQ" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrQacc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
    <marker id="arrQaccSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">QUAM — feedback updates the affinity lookup</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">d₆ has been scored — the next pick d₉ comes from the updated neighborhood</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- POOL label -->
  <text x="80" y="160" font-size="13" fill="#1a1a1a" font-weight="700" letter-spacing="0.5">CANDIDATE POOL</text>
  <text x="80" y="180" font-size="11" fill="#6b665e" font-style="italic">single BM25 signal per document</text>

  <!-- feature legend -->
  <g font-size="10" fill="#6b665e">
    <rect x="80" y="195" width="8" height="8" fill="#8a857a"/>
    <text x="93" y="203">BM25</text>
  </g>

  <!-- Pool box -->
  <rect x="70" y="220" width="310" height="380" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>

  <!-- d1: scored -->
  <g>
    <text x="85" y="247" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">1</tspan></text>
    <rect x="115" y="240" width="190" height="9" fill="#8a857a" rx="1"/>
    <text x="318" y="247" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="252" x2="305" y2="252" stroke="#2a4747" stroke-width="1.5"/>

  <!-- d2: scored -->
  <g>
    <text x="85" y="277" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">2</tspan></text>
    <rect x="115" y="270" width="170" height="9" fill="#8a857a" rx="1"/>
    <text x="318" y="277" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="282" x2="285" y2="282" stroke="#2a4747" stroke-width="1.5"/>

  <!-- d3: scored -->
  <g>
    <text x="85" y="307" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">3</tspan></text>
    <rect x="115" y="300" width="152" height="9" fill="#8a857a" rx="1"/>
    <text x="318" y="307" font-size="10" fill="#2a4747" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="312" x2="267" y2="312" stroke="#2a4747" stroke-width="1.5"/>

  <!-- d6: now scored (was the previous selection) -->
  <g>
    <text x="85" y="337" font-size="11" fill="#c8553d" font-family="Courier, monospace" font-weight="700">d<tspan font-size="9" baseline-shift="sub">6</tspan></text>
    <rect x="115" y="330" width="108" height="9" fill="#c8553d" fill-opacity="0.5" rx="1"/>
    <text x="318" y="337" font-size="10" fill="#c8553d" font-weight="700">● scored</text>
  </g>
  <line x1="115" y1="342" x2="223" y2="342" stroke="#c8553d" stroke-width="1.5"/>

  <!-- divider -->
  <line x1="80" y1="354" x2="372" y2="354" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="368" y="350" font-size="10" fill="#6b665e" text-anchor="end" font-style="italic">judged so far (b = 4)</text>

  <!-- d4 -->
  <text x="85" y="383" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">4</tspan></text>
  <rect x="115" y="376" width="140" height="9" fill="#8a857a" rx="1"/>

  <!-- d5 -->
  <text x="85" y="413" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">5</tspan></text>
  <rect x="115" y="406" width="125" height="9" fill="#8a857a" rx="1"/>

  <!-- d9: NEW selected next by updated neighborhood -->
  <rect x="78" y="430" width="294" height="22" fill="#c8553d" fill-opacity="0.12" rx="2"/>
  <text x="85" y="443" font-size="11" fill="#c8553d" font-family="Courier, monospace" font-weight="700">d<tspan font-size="9" baseline-shift="sub">9</tspan></text>
  <rect x="115" y="436" width="95" height="9" fill="#8a857a" rx="1"/>
  <text x="348" y="443" font-size="10" fill="#c8553d" font-weight="700">▶ next</text>

  <!-- d7, d8 -->
  <text x="85" y="473" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">7</tspan></text>
  <rect x="115" y="466" width="82" height="9" fill="#8a857a" rx="1"/>

  <text x="85" y="503" font-size="11" fill="#1a1a1a" font-family="Courier, monospace">d<tspan font-size="9" baseline-shift="sub">8</tspan></text>
  <rect x="115" y="496" width="70" height="9" fill="#8a857a" rx="1"/>

  <text x="220" y="532" font-size="14" fill="#6b665e" text-anchor="middle">...</text>
  <line x1="80" y1="565" x2="372" y2="565" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="220" y="585" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">only a few will be sent to the expensive ranker</text>

  <!-- ===== NEIGHBORHOOD LOOKUP BOX ===== -->
  <rect x="420" y="195" width="280" height="370" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="560" y="218" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="1.2">LEARNED AFFINITY GRAPH</text>
  <text x="560" y="236" font-size="11" fill="#6b665e" text-anchor="middle" font-style="italic">updated with d₆ score</text>

  <!-- mini graph inside affinity box — same edges as slide 50 -->
  <g stroke="#d8d4cc" stroke-width="1">
    <line x1="490" y1="310" x2="560" y2="280"/>
    <line x1="490" y1="310" x2="560" y2="360"/>
    <line x1="490" y1="310" x2="630" y2="310"/>
    <line x1="560" y1="280" x2="630" y2="310"/>
    <line x1="560" y1="360" x2="630" y2="310"/>
    <line x1="560" y1="280" x2="560" y2="360"/>
    <line x1="490" y1="310" x2="490" y2="430"/>
    <line x1="490" y1="430" x2="560" y2="460"/>
    <line x1="560" y1="460" x2="630" y2="430"/>
    <line x1="630" y1="430" x2="630" y2="310"/>
  </g>
  <!-- strong co-relevance edges -->
  <g stroke="#2a4747" stroke-width="2">
    <line x1="490" y1="310" x2="560" y2="280"/>
    <line x1="560" y1="460" x2="490" y2="430"/>
  </g>
  <!-- previous selection edges (d1↔d6, d2↔d6) — kept terracotta from prior step -->
  <line x1="490" y1="310" x2="560" y2="360" stroke="#c8553d" stroke-width="2.5"/>
  <line x1="560" y1="280" x2="560" y2="360" stroke="#c8553d" stroke-width="2.5"/>
  <!-- NEW: d6 → d9 link, highlighted in red — drives next selection -->
  <line x1="560" y1="360" x2="630" y2="310" stroke="#c8553d" stroke-width="3"/>

  <!-- nodes -->
  <circle cx="490" cy="310" r="18" fill="#dfe3e3" stroke="#2a4747" stroke-width="1.8"/>
  <text x="490" y="315" font-size="10" fill="#2a4747" text-anchor="middle" font-weight="600">d₁</text>

  <circle cx="560" cy="280" r="18" fill="#dfe3e3" stroke="#2a4747" stroke-width="1.8"/>
  <text x="560" y="285" font-size="10" fill="#2a4747" text-anchor="middle" font-weight="600">d₂</text>

  <!-- d9 — selected next -->
  <circle cx="630" cy="310" r="18" fill="#f7e6e2" stroke="#c8553d" stroke-width="2"/>
  <text x="630" y="315" font-size="10" fill="#c8553d" text-anchor="middle" font-weight="700">d₉</text>

  <!-- d6 — now scored -->
  <circle cx="560" cy="360" r="18" fill="#f4ddd8" stroke="#c8553d" stroke-width="2"/>
  <text x="560" y="365" font-size="10" fill="#c8553d" text-anchor="middle" font-weight="700">d₆✓</text>

  <circle cx="490" cy="430" r="18" fill="#ffffff" stroke="#8a857a" stroke-width="1.3"/>
  <text x="490" y="435" font-size="10" fill="#6b665e" text-anchor="middle">d₃</text>

  <circle cx="560" cy="460" r="18" fill="#ffffff" stroke="#8a857a" stroke-width="1.3"/>
  <text x="560" y="465" font-size="10" fill="#6b665e" text-anchor="middle">d₅</text>

  <circle cx="630" cy="430" r="18" fill="#ffffff" stroke="#8a857a" stroke-width="1.3"/>
  <text x="630" y="435" font-size="10" fill="#6b665e" text-anchor="middle">d₇</text>

  <text x="560" y="510" font-size="11" fill="#c8553d" text-anchor="middle" font-style="italic">d₉ is now the strongest co-relevant neighbor of d₆</text>

  <!-- ===== EXPENSIVE RANKER BOX ===== -->
  <rect x="750" y="280" width="220" height="130" fill="#ffffff" stroke="#2a4747" stroke-width="2.4" rx="4"/>
  <text x="860" y="318" font-size="15" fill="#2a4747" text-anchor="middle" font-weight="700">EXPENSIVE RANKER</text>
  <text x="860" y="343" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">cross-encoder /</text>
  <text x="860" y="358" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">RankLLaMA / etc.</text>
  <text x="860" y="394" font-size="11" fill="#2a4747" text-anchor="middle" font-weight="700" letter-spacing="0.5">scores docs in batch</text>

  <!-- pool → affinity graph -->
  <line x1="384" y1="350" x2="418" y2="350" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrQ)"/>

  <!-- affinity graph → ranker -->
  <line x1="702" y1="345" x2="748" y2="345" stroke="#c8553d" stroke-width="2.2" marker-end="url(#arrQacc)"/>
  <text x="725" y="333" font-size="10" fill="#c8553d" text-anchor="middle" font-weight="700">d₉</text>

  <!-- ===== FEEDBACK ARROW — clean smooth curve below all boxes ===== -->
  <path d="M 860 415 Q 860 635 540 635 Q 220 635 220 615"
        fill="none" stroke="#c8553d" stroke-width="2.2"
        stroke-dasharray="7,5" stroke-linecap="round"
        marker-end="url(#arrQaccSmall)"/>
  <text x="540" y="618" font-size="12" fill="#c8553d" text-anchor="middle" font-style="italic" font-weight="600">relevance signal · update affinity graph</text>

  <!-- footer caption -->
  <line x1="80" y1="668" x2="200" y2="668" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="694" font-size="14" fill="#1a1a1a" font-style="italic">Each scored document updates the graph — the next pick follows the strongest co-relevant edge.</text>
</svg>
