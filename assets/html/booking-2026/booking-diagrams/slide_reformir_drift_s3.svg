<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- TITLE -->
  <text font-weight="bold" font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" fill="#1a1a1a">More reformulations → more drift</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" fill="#6b665e" font-style="italic">Classical reformulation degrades past ~10 reformulations · ReformIR stays stable</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- chart label / context -->
  <text x="80" y="170" font-size="12" fill="#6b665e" font-style="italic" letter-spacing="0.5">TREC DL19 · BM25 → MonoT5 (budget c=100)</text>

  <!-- vertical axis -->
  <line x1="220" y1="200" x2="220" y2="500" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- horizontal axis -->
  <line x1="220" y1="500" x2="880" y2="500" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- horizontal grid lines -->
  <line x1="220" y1="200" x2="880" y2="200" stroke="#e8e2d6" stroke-width="0.8"/>
  <line x1="220" y1="300" x2="880" y2="300" stroke="#e8e2d6" stroke-width="0.8"/>
  <line x1="220" y1="400" x2="880" y2="400" stroke="#e8e2d6" stroke-width="0.8"/>

  <!-- y-axis tick labels -->
  <g font-size="12" fill="#6b665e" text-anchor="end">
    <text x="208" y="205">0.60</text>
    <text x="208" y="305">0.55</text>
    <text x="208" y="405">0.50</text>
    <text x="208" y="505">0.45</text>
  </g>

  <!-- y-axis title -->
  <text x="100" y="350" font-size="14" fill="#1a1a1a" transform="rotate(-90, 100, 350)" text-anchor="middle" letter-spacing="0.4">Recall@100</text>

  <!-- x-axis ticks + labels -->
  <g font-size="12" fill="#6b665e" text-anchor="middle">
    <line x1="240" y1="500" x2="240" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="240" y="524">0</text>
    <line x1="320" y1="500" x2="320" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="320" y="524">3</text>
    <line x1="400" y1="500" x2="400" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="400" y="524">5</text>
    <line x1="500" y1="500" x2="500" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="500" y="524">10</text>
    <line x1="600" y1="500" x2="600" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="600" y="524">15</text>
    <line x1="720" y1="500" x2="720" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="720" y="524">25</text>
    <line x1="860" y1="500" x2="860" y2="506" stroke="#1a1a1a" stroke-width="1"/>
    <text x="860" y="524">50</text>
  </g>

  <!-- x-axis title -->
  <text x="550" y="558" font-size="14" fill="#1a1a1a" text-anchor="middle" letter-spacing="0.3"># of reformulations</text>

  <!-- BM25 baseline -->
  <line x1="240" y1="400" x2="860" y2="400" stroke="#8a857a" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="438" y="392" font-size="13" fill="#6b665e" letter-spacing="0.3">BM25 baseline</text>

  <!-- drift zone rect -->
  <rect x="720" y="200" width="160" height="300" fill="#c8553d" fill-opacity="0.04"/>

  <!-- GenQR curve -->
  <polyline points="240,400 320,330 400,320 500,330 600,360 720,420 860,480"
            fill="none" stroke="#2a4747" stroke-width="2.4"/>
  <!-- GenQR dots -->
  <g fill="#2a4747">
    <circle cx="240" cy="400" r="4"/>
    <circle cx="320" cy="330" r="4"/>
    <circle cx="400" cy="320" r="4"/>
    <circle cx="500" cy="330" r="4"/>
    <circle cx="600" cy="360" r="4"/>
    <circle cx="720" cy="420" r="4"/>
    <circle cx="860" cy="480" r="4"/>
  </g>

  <!-- GenQR label -->
  <text x="688" y="450" font-size="14" fill="#2a4747" font-weight="bold" letter-spacing="0.3">GenQR</text>
  <text x="688" y="467" font-size="11" fill="#2a4747" font-style="italic">drift dominates past 10</text>

  <!-- drift zone annotation -->
  <text x="800" y="582" font-size="11" fill="#6b665e" font-style="italic" text-anchor="middle">drift zone — classical reformulation collapses</text>
  <line x1="720" y1="568" x2="880" y2="568" stroke="#c8553d" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ReformIR curve -->
  <polyline points="240,400 320,290 400,250 500,230 600,220 720,220 860,230"
            fill="none" stroke="#c8553d" stroke-width="3"/>
  <!-- ReformIR dots -->
  <g fill="#c8553d">
    <circle cx="240" cy="400" r="4.5"/>
    <circle cx="320" cy="290" r="4.5"/>
    <circle cx="400" cy="250" r="4.5"/>
    <circle cx="500" cy="230" r="4.5"/>
    <circle cx="600" cy="220" r="4.5"/>
    <circle cx="720" cy="220" r="4.5"/>
    <circle cx="860" cy="230" r="4.5"/>
  </g>

  <!-- ReformIR label -->
  <text x="780" y="208" font-size="14" fill="#c8553d" font-weight="bold" letter-spacing="0.3">ReformIR</text>
  <text x="780" y="225" font-size="11" fill="#c8553d" font-style="italic">stable · keeps improving</text>

  <!-- footer -->
  <line x1="80" y1="630" x2="200" y2="630" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="660" font-size="16" fill="#1a1a1a">Adding more reformulations doesn't fix recall — <tspan fill="#c8553d" font-weight="bold">picking the right ones does.</tspan></text>
  <text x="80" y="688" font-size="14" fill="#6b665e" font-style="italic">ReformIR uses ranker feedback to up-weight useful reformulations and down-weight drifty ones.</text>
</svg>
