<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">Failure 3 — the cost wall</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">Better rerankers exist. You can't afford to run them.</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- LEFT: 40× big number + LATENCY TAX label -->
  <text x="80" y="222" font-size="14" fill="#c8553d" font-weight="700" letter-spacing="2">LATENCY TAX</text>

  <text x="80" y="390" font-size="150" fill="#c8553d" font-weight="700">40×</text>

  <text x="80" y="435" font-size="22" fill="#1a1a1a" font-weight="700" letter-spacing="0.5">slower per query</text>
  <text x="80" y="462" font-size="16" fill="#6b665e" font-style="italic">cross-encoder → LLM reranker</text>

  <!-- vertical divider -->
  <line x1="490" y1="148" x2="490" y2="600" stroke="#e8e2d6" stroke-width="1"/>

  <!-- RIGHT: latency comparison bars -->
  <text x="530" y="222" font-size="14" fill="#1a1a1a" font-weight="700" letter-spacing="2">TIME TO RANK 1,000 DOCUMENTS</text>

  <!-- cross-encoder row -->
  <text x="530" y="285" font-size="15" fill="#6b665e">cross-encoder reranker</text>
  <rect x="530" y="298" width="13" height="28" fill="#b8b3a8" rx="2"/>
  <text x="552" y="318" font-size="16" fill="#6b665e" font-weight="600">~3 s</text>

  <!-- LLM reranker row -->
  <text x="530" y="378" font-size="15" fill="#c8553d" font-weight="700">LLM reranker (7B param)</text>
  <rect x="530" y="391" width="530" height="28" fill="#c8553d" rx="2"/>
  <text x="1056" y="411" font-size="16" fill="#c8553d" font-weight="600" text-anchor="end">~120 s</text>

  <!-- scale bracket -->
  <line x1="530" y1="440" x2="1060" y2="440" stroke="#8a857a" stroke-width="0.8"/>
  <line x1="530" y1="434" x2="530" y2="446" stroke="#8a857a" stroke-width="0.8"/>
  <line x1="1060" y1="434" x2="1060" y2="446" stroke="#8a857a" stroke-width="0.8"/>
  <text x="795" y="460" font-size="12" fill="#6b665e" text-anchor="middle" font-style="italic">40× span</text>

  <!-- production budget callout -->
  <line x1="530" y1="430" x2="530" y2="480" stroke="#2a4747" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="536" y="493" font-size="12" fill="#2a4747" font-weight="600">1–2 s</text>
  <text x="536" y="508" font-size="11" fill="#2a4747" font-style="italic">production budget</text>

  <!-- footer -->
  <line x1="80" y1="590" x2="200" y2="590" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="624" font-size="17" fill="#1a1a1a">Production search has a second-scale latency budget, not a minute-scale one.</text>
  <text x="80" y="652" font-size="15" fill="#6b665e" font-style="italic">You can afford the LLM reranker on 10–20 candidates. Not on 1,000.</text>
  <text x="80" y="682" font-size="14" fill="#c8553d" font-weight="700">Better rerankers don't fix bad retrievers — they make the gap more expensive to ignore.</text>

</svg>
