<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" width="1100" height="480">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a857a"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a4747"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c8553d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- Standard Header -->
  
  
  

  <!-- ══════════════════ QUERY BAR (y=140–180) ══════════════════ -->
  <rect x="100" y="142" width="900" height="40" rx="20" stroke="#2a4747" stroke-width="1.5" fill="white"/>
  <!-- Search icon -->
  <circle cx="128" cy="162" r="7" stroke="#8a857a" stroke-width="1.5" fill="none"/>
  <line x1="133" y1="167" x2="139" y2="173" stroke="#8a857a" stroke-width="1.5"/>
  <!-- Query text -->
  <text x="148" y="167" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#1a1a1a">What are the best hotels near the Eiffel Tower, Paris?</text>
  <!-- Submit arrow button -->
  <rect x="960" y="150" width="30" height="24" rx="12" fill="#2a4747"/>
  <text x="975" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="white" text-anchor="middle">→</text>

  <!-- ══════════════════ LEFT COLUMN — SOURCES ══════════════════ -->
  <!-- Column background -->
  <rect x="100" y="200" width="400" height="380" rx="3" stroke="#e8e2d6" stroke-width="0.8" fill="white"/>

  <!-- Header -->
  <text x="100" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="#6b665e" letter-spacing="0.8">SOURCES</text>
  <line x1="100" y1="226" x2="500" y2="226" stroke="#e8e2d6" stroke-width="0.8"/>

  <!-- Source Card 1 (y=230) -->
  <rect x="103" y="230" width="385" height="60" rx="3" stroke="#e8e2d6" stroke-width="0.8" fill="#ffffff"/>
  <circle cx="115" cy="250" r="4" fill="#c8553d"/>
  <text x="125" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e">tripadvisor.com</text>
  <text x="115" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a1a">Best Hotels near Eiffel Tower - 2024</text>
  <text x="115" y="279" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e" font-style="italic">The Eiffel Tower area in the 7th arrondissement...</text>
  <!-- Citation badge -->
  <circle cx="478" cy="248" r="7" fill="#c8553d"/>
  <text x="478" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="white" text-anchor="middle">1</text>

  <!-- Source Card 2 (y=300) -->
  <rect x="103" y="300" width="385" height="60" rx="3" stroke="#e8e2d6" stroke-width="0.8" fill="#ffffff"/>
  <circle cx="115" cy="320" r="4" fill="#2a4747"/>
  <text x="125" y="322" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e">booking.com</text>
  <text x="115" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a1a">Hotels in Trocadéro &amp; Eiffel Tower Paris</text>
  <text x="115" y="349" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e" font-style="italic">From €89/night · 847 properties available...</text>
  <circle cx="478" cy="318" r="7" fill="#c8553d"/>
  <text x="478" y="322" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="white" text-anchor="middle">2</text>

  <!-- Source Card 3 (y=370) -->
  <rect x="103" y="370" width="385" height="60" rx="3" stroke="#e8e2d6" stroke-width="0.8" fill="#ffffff"/>
  <circle cx="115" cy="390" r="4" fill="#8a857a"/>
  <text x="125" y="392" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e">lonelyplanet.com</text>
  <text x="115" y="406" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1a1a">Where to Stay in Paris: Best Neighbourhoods</text>
  <text x="115" y="419" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e" font-style="italic">The 7th and 8th arrondissements offer the closest...</text>
  <circle cx="478" cy="388" r="7" fill="#c8553d"/>
  <text x="478" y="392" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="white" text-anchor="middle">3</text>

  <!-- More sources -->
  <text x="115" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c8553d">+ 4 more sources</text>

  <!-- Source count indicator bar -->
  <line x1="103" y1="460" x2="488" y2="460" stroke="#e8e2d6" stroke-width="0.8"/>
  <text x="115" y="476" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#8a857a">7 sources retrieved and ranked</text>

  <!-- ══════════════════ RIGHT COLUMN — SYNTHESIZED ANSWER ══════════════════ -->
  <!-- Header -->
  <text x="525" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="#6b665e" letter-spacing="0.8">ANSWER</text>

  <!-- Answer box -->
  <rect x="525" y="228" width="470" height="320" rx="3" stroke="#e8e2d6" stroke-width="0.8" fill="#ffffff"/>

  <!-- Answer text block -->
  <text x="540" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">Based on proximity, ratings, and availability, the best hotels</text>
  <text x="540" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">near the Eiffel Tower include:</text>

  <line x1="540" y1="276" x2="985" y2="276" stroke="#e8e2d6" stroke-width="0.5"/>

  <!-- Bullet 1 -->
  <text x="540" y="298" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">•  Hôtel Plaza Athénée (5★) — 1.2 km, exceptional</text>
  <text x="540" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">   reviews, from €850/night</text>
  <!-- Citation superscript -->
  <text x="972" y="293" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#c8553d">[1]</text>

  <!-- Bullet 2 -->
  <text x="540" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">•  Le Walt Paris (4★) — 0.4 km from the Tower,</text>
  <text x="540" y="366" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">   highly rated for views, from €220/night</text>
  <text x="972" y="343" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#c8553d">[2]</text>

  <!-- Bullet 3 -->
  <text x="540" y="398" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">•  citizenM Paris Gare de Lyon (3★) — modern,</text>
  <text x="540" y="416" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#1a1a1a">   budget-friendly from €119/night</text>
  <text x="972" y="393" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#c8553d">[3]</text>

  <line x1="540" y1="430" x2="985" y2="430" stroke="#e8e2d6" stroke-width="0.5"/>

  <!-- Tip text -->
  <text x="540" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#6b665e" font-style="italic">For the best Tower views, request a room on the</text>
  <text x="540" y="468" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="#6b665e" font-style="italic">upper floors facing north.</text>

  <!-- RAG label annotation -->
  <rect x="850" y="453" width="130" height="28" rx="3" fill="#2a4747" fill-opacity="0.08" stroke="#2a4747" stroke-width="0.8"/>
  <text x="915" y="471" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#2a4747" text-anchor="middle">synthesized from sources</text>

  <!-- ══════════════════ PIPELINE FLOW (y=600–660) ══════════════════ -->
  <!-- Background strip -->
  <rect x="80" y="600" width="940" height="50" rx="3" fill="#e8e2d6" fill-opacity="0.4"/>

  <!-- Step 1: QUERY -->
  <rect x="130" y="625" width="80" height="28" rx="2" stroke="#8a857a" stroke-width="1.2" fill="white"/>
  <text x="170" y="643" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#8a857a" text-anchor="middle">QUERY</text>

  <!-- Arrow 1 -->
  <line x1="215" y1="639" x2="248" y2="639" stroke="#8a857a" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: RETRIEVE -->
  <rect x="255" y="625" width="80" height="28" rx="2" stroke="#2a4747" stroke-width="1.2" fill="white"/>
  <text x="295" y="643" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#2a4747" text-anchor="middle">RETRIEVE</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="639" x2="373" y2="639" stroke="#2a4747" stroke-width="1.2" marker-end="url(#arrowhead-teal)"/>

  <!-- Step 3: RERANK -->
  <rect x="380" y="625" width="80" height="28" rx="2" stroke="#2a4747" stroke-width="1.2" fill="white"/>
  <text x="420" y="643" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#2a4747" text-anchor="middle">RERANK</text>

  <!-- Arrow 3 -->
  <line x1="465" y1="639" x2="498" y2="639" stroke="#2a4747" stroke-width="1.2" marker-end="url(#arrowhead-teal)"/>

  <!-- Step 4: GENERATE -->
  <rect x="505" y="625" width="80" height="28" rx="2" stroke="#c8553d" stroke-width="1.2" fill="white"/>
  <text x="545" y="643" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#c8553d" text-anchor="middle">GENERATE</text>

  <!-- Arrow 4 -->
  <line x1="590" y1="639" x2="623" y2="639" stroke="#c8553d" stroke-width="1.2" marker-end="url(#arrowhead-accent)"/>

  <!-- Step 5: ANSWER -->
  <rect x="630" y="625" width="80" height="28" rx="2" stroke="#c8553d" stroke-width="1.5" fill="#c8553d" fill-opacity="0.08"/>
  <text x="670" y="643" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#c8553d" text-anchor="middle" font-weight="700">ANSWER</text>

  <!-- Pipeline label -->
  <text x="860" y="630" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#6b665e" font-style="italic">RAG pipeline</text>
  <text x="860" y="645" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#8a857a">retrieve → synthesize → respond</text>

  <!-- Connecting visual: dotted lines from sources to pipeline -->
  <line x1="295" y1="580" x2="295" y2="600" stroke="#2a4747" stroke-width="0.8" stroke-dasharray="3,3"/>
  <circle cx="295" cy="582" r="3" fill="#2a4747" fill-opacity="0.4"/>

  <line x1="420" y1="580" x2="420" y2="600" stroke="#2a4747" stroke-width="0.8" stroke-dasharray="3,3"/>
  <circle cx="420" cy="582" r="3" fill="#2a4747" fill-opacity="0.4"/>

  <line x1="545" y1="548" x2="545" y2="600" stroke="#c8553d" stroke-width="0.8" stroke-dasharray="3,3"/>
  <circle cx="545" cy="550" r="3" fill="#c8553d" fill-opacity="0.4"/>

</svg>
