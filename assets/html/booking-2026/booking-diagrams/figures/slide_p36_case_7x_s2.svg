    <circle cx="890" cy="315" r="5"/><circle cx="910" cy="315" r="5"/>
    <circle cx="930" cy="315" r="5"/><circle cx="950" cy="315" r="5"/>
    <circle cx="970" cy="315" r="5"/><circle cx="990" cy="315" r="5"/>
    <!-- Row 2 cy=335 -->
