<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" width="1100" height="720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">What did we learn from QUAM?</text>
  <text x="80" y="94" font-size="16" fill="#6b665e" font-style="italic">A new perspective — the reranker guides <tspan font-style="italic" fill="#c8553d">what to retrieve</tspan>, per query.</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <g transform="translate(80, 180)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="380" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"/>
    <rect x="0" y="0" width="280" height="6" rx="6" fill="#c8553d"/>
    <text x="28" y="78" font-size="56" font-weight="bold" fill="#c8553d">1</text>
    <text x="28" y="108" font-size="11" font-weight="bold" fill="#6b665e" letter-spacing="1.2">NO LATENCY COST</text>
    <line x1="28" y1="120" x2="78" y2="120" stroke="#6b665e" stroke-width="0.8"/>
    <text x="28" y="158" font-size="20" fill="#1a1a1a" font-weight="bold">Same number</text>
    <text x="28" y="186" font-size="20" fill="#1a1a1a" font-weight="bold">of reranker calls.</text>
    <text x="28" y="232" font-size="14" fill="#6b665e" font-style="italic">No extra inference</text>
    <text x="28" y="252" font-size="14" fill="#6b665e" font-style="italic">budget — the expensive</text>
    <text x="28" y="272" font-size="14" fill="#6b665e" font-style="italic">call count is unchanged.</text>
    <g transform="translate(140, 320)">
      <line x1="-30" y1="-6" x2="30" y2="-6" stroke="#c8553d" stroke-width="2.5"/>
      <line x1="-30" y1="6" x2="30" y2="6" stroke="#c8553d" stroke-width="2.5"/>
    </g>
  </g>
  <g transform="translate(410, 180)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="280" height="380" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"/>
    <rect x="0" y="0" width="280" height="6" rx="6" fill="#c8553d"/>
    <text x="28" y="78" font-size="56" font-weight="bold" fill="#c8553d">2</text>
    <text x="28" y="108" font-size="11" font-weight="bold" fill="#6b665e" letter-spacing="1.2">EXPLOITS DOC PROXIMITY</text>
    <line x1="28" y1="120" x2="78" y2="120" stroke="#6b665e" stroke-width="0.8"/>
    <text x="28" y="158" font-size="20" fill="#1a1a1a" font-weight="bold">Neighborhoods</text>
    <text x="28" y="186" font-size="20" fill="#1a1a1a" font-weight="bold">carry signal.</text>
    <text x="28" y="232" font-size="14" fill="#6b665e" font-style="italic">Co-relevance information</text>
    <text x="28" y="252" font-size="14" fill="#6b665e" font-style="italic">that today's pipelines</text>
    <text x="28" y="272" font-size="14" fill="#6b665e" font-style="italic">ignore entirely.</text>
    <g transform="translate(140, 320)">
      <circle cx="0" cy="0" r="6" fill="#c8553d"/>
      <circle cx="-22" cy="-14" r="4" fill="none" stroke="#c8553d" stroke-width="1.6"/>
      <circle cx="22" cy="-14" r="4" fill="none" stroke="#c8553d" stroke-width="1.6"/>
      <circle cx="-18" cy="14" r="4" fill="none" stroke="#c8553d" stroke-width="1.6"/>
      <circle cx="20" cy="14" r="4" fill="none" stroke="#c8553d" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-22" y2="-14" stroke="#c8553d" stroke-width="1"/>
      <line x1="0" y1="0" x2="22" y2="-14" stroke="#c8553d" stroke-width="1"/>
      <line x1="0" y1="0" x2="-18" y2="14" stroke="#c8553d" stroke-width="1"/>
      <line x1="0" y1="0" x2="20" y2="14" stroke="#c8553d" stroke-width="1"/>
    </g>
  </g>

  <!-- FOOTER -->
  <line x1="80" y1="640" x2="200" y2="640" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="668" font-size="15" fill="#1a1a1a">The reranker is no longer a passive scorer — it tells the retriever where to look next.</text>
  <text x="80" y="690" font-size="14" fill="#6b665e" font-style="italic">Per-query. Online. From feedback.</text>
</svg>
