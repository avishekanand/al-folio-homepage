<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" font-family="Georgia, 'Times New Roman', serif" width="1100" height="480">
  <!-- ============================================================
       EMBEDDING vs DOCUMENT — p. 18 — STEP 1
       Left panel only: retriever's view as a vector dot in space
       + vertical divider. No right panel.
       ============================================================ -->

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  
  

  <!-- ============================================================
       LEFT — retriever's view: a dot in vector space
       ============================================================ -->

  <text x="270" y="170" font-size="13" fill="#1a1a1a" text-anchor="middle" font-weight="700" letter-spacing="2">
    THE RETRIEVER SEES
  </text>
  <text x="270" y="190" font-size="14" fill="#6b665e" text-anchor="middle" font-style="italic">
    a vector
  </text>

  <!-- 2D embedding space frame -->
  <rect x="120" y="220" width="300" height="300" fill="none" stroke="#6b665e" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- axis lines -->
  <line x1="120" y1="370" x2="420" y2="370" stroke="#b8b3a8" stroke-width="0.8"/>
  <line x1="270" y1="220" x2="270" y2="520" stroke="#b8b3a8" stroke-width="0.8"/>

  <!-- many surrounding dots (other documents) -->
  <g fill="#b8b3a8">
    <circle cx="180" cy="280" r="3"/>
    <circle cx="220" cy="310" r="3"/>
    <circle cx="155" cy="350" r="3"/>
    <circle cx="200" cy="390" r="3"/>
    <circle cx="170" cy="450" r="3"/>
    <circle cx="240" cy="470" r="3"/>
    <circle cx="320" cy="280" r="3"/>
    <circle cx="370" cy="320" r="3"/>
    <circle cx="395" cy="380" r="3"/>
    <circle cx="350" cy="430" r="3"/>
    <circle cx="305" cy="470" r="3"/>
    <circle cx="380" cy="490" r="3"/>
  </g>

  <!-- the document of interest, highlighted -->
  <circle cx="305" cy="345" r="9" fill="#c8553d"/>
  <circle cx="305" cy="345" r="14" fill="none" stroke="#c8553d" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- vector arrow from origin to the dot -->
  <line x1="270" y1="370" x2="305" y2="345" stroke="#c8553d" stroke-width="1.5"/>

  <!-- coords label -->
  <text x="320" y="334" font-size="12" fill="#c8553d" font-style="italic">d</text>

  <!-- under-frame description -->
  <text x="270" y="555" font-size="14" fill="#1a1a1a" text-anchor="middle">
    a 768-dim point
  </text>
  <text x="270" y="573" font-size="13" fill="#6b665e" text-anchor="middle" font-style="italic">
    fast · shallow · approximate
  </text>

  <!-- ============================================================
       VERTICAL DIVIDER
       ============================================================ -->
  <line x1="540" y1="190" x2="540" y2="600" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4,5"/>

</svg>
