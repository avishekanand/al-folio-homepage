  <g fill="#c8553d">
    <circle cx="850" cy="330" r="5"/>
    <circle cx="850" cy="365" r="5"/>
    <circle cx="850" cy="395" r="5"/>
    <circle cx="850" cy="425" r="5"/>
  </g>

  <!-- "rest of arm space" faded ellipse -->
  <ellipse cx="975" cy="380" rx="55" ry="140" fill="none" stroke="#b8b3a8" stroke-width="1" stroke-dasharray="2,4" opacity="0.6"/>
  <text x="975" y="218" font-size="11" fill="#b8b3a8" text-anchor="middle" font-style="italic">rest of arm space</text>
  <text x="975" y="232" font-size="10" fill="#b8b3a8" text-anchor="middle" font-style="italic">(pruned out)</text>
  <g fill="#b8b3a8" opacity="0.35">
    <circle cx="945" cy="295" r="3"/><circle cx="985" cy="305" r="3"/>
    <circle cx="1010" cy="320" r="3"/><circle cx="950" cy="340" r="3"/>
    <circle cx="990" cy="345" r="3"/><circle cx="1015" cy="365" r="3"/>
    <circle cx="945" cy="385" r="3"/><circle cx="990" cy="395" r="3"/>
    <circle cx="1015" cy="415" r="3"/><circle cx="950" cy="430" r="3"/>
    <circle cx="990" cy="445" r="3"/><circle cx="1010" cy="465" r="3"/>
  </g>

  <!-- sparse edges: only U_t to N_t -->
  <g stroke="#c8553d" stroke-width="1" stroke-opacity="0.7">
    <line x1="686" y1="320" x2="844" y2="330"/>
    <line x1="686" y1="320" x2="844" y2="365"/>
    <line x1="686" y1="355" x2="844" y2="330"/>
    <line x1="686" y1="355" x2="844" y2="395"/>
    <line x1="686" y1="395" x2="844" y2="365"/>
    <line x1="686" y1="395" x2="844" y2="425"/>
    <line x1="686" y1="435" x2="844" y2="395"/>
    <line x1="686" y1="435" x2="844" y2="425"/>
  </g>

  <!-- arm-shuffling annotation -->
  <text x="765" y="525" font-size="11" fill="#c8553d" text-anchor="middle" font-style="italic">arms move between U_t and N_t as estimates refine</text>
</svg>
