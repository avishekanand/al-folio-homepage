<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Georgia, 'Times New Roman', serif">

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="68" font-size="32" font-weight="bold" fill="#1a1a1a">How do we collect explanation data?</text>
  <text font-family="Georgia, 'Times New Roman', serif" x="80" y="94" font-size="16" font-style="italic" fill="#6b665e">Two regimes — extractive annotations of text vs abstractive natural-language explanations</text>
  <line x1="80" y1="112" x2="200" y2="112" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- ============================================================
       LEFT — EXTRACTIVE
       ============================================================ -->
  <g transform="translate(80, 150)">
    <!-- header -->
    <rect x="0" y="0" width="460" height="44" rx="6" fill="#2a4747"/>
    <text x="230" y="29" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700" letter-spacing="0.5">EXTRACTIVE</text>

    <text x="0" y="68" font-size="14" fill="#1a1a1a" font-style="italic">Spans, tokens, or rationales <tspan fill="#6b665e">selected directly from the document.</tspan></text>

    <!-- Document card with highlighted spans -->
    <rect x="0" y="84" width="460" height="200" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"/>
    <text x="14" y="106" font-size="11" fill="#6b665e" font-style="italic">Query: <tspan fill="#1a1a1a" font-style="normal">romantic weekend near Amsterdam canals</tspan></text>
    <line x1="14" y1="116" x2="446" y2="116" stroke="#e8e2d6" stroke-width="1"/>

    <!-- doc text with highlights — each segment positioned explicitly so highlight rects sit on full words -->
    <!-- Line 1: "A boutique [canal-side] hotel" -->
    <rect x="92" y="130" width="78" height="18" fill="#c8553d" fill-opacity="0.35" rx="2"/>
    <text x="14" y="143" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" textLength="78" lengthAdjust="spacingAndGlyphs">A boutique</text>
    <text x="96" y="143" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" font-weight="700" textLength="70" lengthAdjust="spacingAndGlyphs">canal-side</text>
    <text x="170" y="143" font-size="13" fill="#1a1a1a" font-family="Georgia, serif">hotel</text>

    <!-- Line 2: "offering [romantic suites] with private" -->
    <rect x="72" y="154" width="124" height="18" fill="#c8553d" fill-opacity="0.35" rx="2"/>
    <text x="14" y="167" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" textLength="56" lengthAdjust="spacingAndGlyphs">offering</text>
    <text x="76" y="167" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" font-weight="700" textLength="116" lengthAdjust="spacingAndGlyphs">romantic suites</text>
    <text x="200" y="167" font-size="13" fill="#1a1a1a" font-family="Georgia, serif">with private</text>

    <!-- Line 3 (no highlight) -->
    <text x="14" y="191" font-size="13" fill="#1a1a1a" font-family="Georgia, serif">balconies, walking distance to Anne</text>

    <!-- Line 4: "Frank House and the [Jordaan district]." -->
    <rect x="156" y="202" width="125" height="18" fill="#c8553d" fill-opacity="0.35" rx="2"/>
    <text x="14" y="215" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" textLength="138" lengthAdjust="spacingAndGlyphs">Frank House and the</text>
    <text x="160" y="215" font-size="13" fill="#1a1a1a" font-family="Georgia, serif" font-weight="700" textLength="117" lengthAdjust="spacingAndGlyphs">Jordaan district</text>
    <text x="281" y="215" font-size="13" fill="#1a1a1a" font-family="Georgia, serif">.</text>

    <text x="14" y="240" font-size="13" fill="#1a1a1a" font-family="Georgia, serif">Couples-only floor available year-round.</text>

    <!-- annotator chips -->
    <g font-size="10">
      <rect x="14" y="252" width="100" height="20" rx="10" fill="none" stroke="#c8553d" stroke-width="1"/>
      <text x="64" y="266" text-anchor="middle" fill="#c8553d" font-weight="700">canal-side</text>
      <rect x="122" y="252" width="120" height="20" rx="10" fill="none" stroke="#c8553d" stroke-width="1"/>
      <text x="182" y="266" text-anchor="middle" fill="#c8553d" font-weight="700">romantic suites</text>
      <rect x="250" y="252" width="120" height="20" rx="10" fill="none" stroke="#c8553d" stroke-width="1"/>
      <text x="310" y="266" text-anchor="middle" fill="#c8553d" font-weight="700">Jordaan district</text>
    </g>

    <!-- examples row -->
    <text x="0" y="312" font-size="12" fill="#6b665e" font-style="italic">Examples</text>
    <text x="0" y="332" font-size="12" fill="#1a1a1a">·  rationale extraction · token attributions</text>
    <text x="0" y="350" font-size="12" fill="#1a1a1a">·  feature highlights · supporting sentences</text>
    <text x="0" y="368" font-size="12" fill="#1a1a1a">·  TREC-DL relevance judgments + spans</text>

    <!-- pros / cons -->
    <text x="0" y="402" font-size="11" fill="#2a4747" font-weight="700" letter-spacing="0.5">+  cheap to collect at scale · grounded in the source</text>
    <text x="0" y="420" font-size="11" fill="#8a857a">−  bounded by what the document literally says</text>
  </g>

  <!-- ============================================================
       RIGHT — ABSTRACTIVE
       ============================================================ -->
  <g transform="translate(560, 150)">
    <!-- header -->
    <rect x="0" y="0" width="460" height="44" rx="6" fill="#c8553d"/>
    <text x="230" y="29" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="700" letter-spacing="0.5">ABSTRACTIVE</text>

    <text x="0" y="68" font-size="14" fill="#1a1a1a" font-style="italic">Free-form natural-language rationale <tspan fill="#6b665e">— now what LLMs produce.</tspan></text>

    <!-- LLM card -->
    <rect x="0" y="84" width="460" height="200" rx="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"/>

    <text x="14" y="106" font-size="11" fill="#6b665e" font-style="italic">Q: <tspan fill="#1a1a1a" font-style="normal">romantic weekend near Amsterdam canals</tspan></text>
    <text x="14" y="124" font-size="11" fill="#6b665e" font-style="italic">A: <tspan fill="#1a1a1a" font-style="normal">Boutique hotel in the Jordaan, canal-side, couples-only floor.</tspan></text>
    <line x1="14" y1="134" x2="446" y2="134" stroke="#e8e2d6" stroke-width="1"/>
    <text x="14" y="152" font-size="11" fill="#6b665e" font-style="italic">E: explanation</text>

    <!-- generated explanation paragraph -->
    <text x="14" y="172" font-size="13" fill="#1a1a1a">"This boutique canal-side property fits</text>
    <text x="14" y="190" font-size="13" fill="#1a1a1a">because it pairs the <tspan font-style="italic">romantic atmosphere</tspan></text>
    <text x="14" y="208" font-size="13" fill="#1a1a1a">the query implies (couples-only floor,</text>
    <text x="14" y="226" font-size="13" fill="#1a1a1a">private balconies) with a <tspan font-style="italic">canal location</tspan></text>
    <text x="14" y="244" font-size="13" fill="#1a1a1a">in the Jordaan — the <tspan font-style="italic">Amsterdam setting</tspan> asked for."</text>

    <text x="14" y="272" font-size="11" fill="#c8553d" font-style="italic">↑ Q–A–E triple — we call this an <tspan font-weight="700">exemplar</tspan></text>

    <!-- examples row -->
    <text x="0" y="312" font-size="12" fill="#6b665e" font-style="italic">Examples</text>
    <text x="0" y="332" font-size="12" fill="#1a1a1a">·  GPT-4 / Claude relevance rationales</text>
    <text x="0" y="350" font-size="12" fill="#1a1a1a">·  e-SNLI · CoS-E · ECQA chain-of-thought</text>
    <text x="0" y="368" font-size="12" fill="#1a1a1a">·  reranker rationales for RAG citations</text>

    <!-- pros / cons -->
    <text x="0" y="402" font-size="11" fill="#2a4747" font-weight="700" letter-spacing="0.5">+  expressive · captures intent · transferable</text>
    <text x="0" y="420" font-size="11" fill="#8a857a">−  hallucination risk · harder to verify</text>
  </g>

  <!-- footer caption -->
  <line x1="80" y1="640" x2="200" y2="640" stroke="#c8553d" stroke-width="1.5"/>
  <text x="80" y="668" font-size="15" fill="#1a1a1a">Most early IR explanation work is <tspan font-style="italic" fill="#2a4747">extractive</tspan>. The LLM era moves the field <tspan font-style="italic" fill="#c8553d">abstractive</tspan>.</text>
  <text x="80" y="690" font-size="13" fill="#6b665e" font-style="italic">Collecting both — and learning to score them — is what makes interpretable retrieval trainable.</text>
</svg>
