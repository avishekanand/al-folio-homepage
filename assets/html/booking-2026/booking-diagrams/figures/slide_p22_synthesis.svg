<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 130 1100 480" font-family="Georgia, 'Times New Roman', serif" width="1100" height="480">
  <!-- ============================================================
       SYNTHESIS — p. 22
       Three perspectives, one principle.
       Three small abstract icons, each over a perspective name,
       converging downward into a single line.
       ============================================================ -->

  <defs>
    <marker id="arrSyn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c8553d"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- title -->
  
  

  <!-- ============================================================
       Three columns at x centers: 250, 550, 850
       Each: small icon (about 80px tall) + perspective title + 1-line summary
       Then arrows converge into a single principle below
       ============================================================ -->

  <!-- ===== Icon 1: cascading (pipeline-with-loop-back) ===== -->
  <g>
    <!-- 4 small boxes in a row representing pipeline stages -->
    <rect x="200" y="190" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
    <rect x="232" y="190" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
    <rect x="264" y="190" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
    <rect x="296" y="190" width="22" height="22" fill="none" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
    <!-- forward arrows -->
    <line x1="222" y1="201" x2="232" y2="201" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="254" y1="201" x2="264" y2="201" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="286" y1="201" x2="296" y2="201" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- feedback loop arc from box 3 back to box 1 -->
    <path d="M 275 220 Q 250 250 211 220" fill="none" stroke="#c8553d" stroke-width="2" stroke-dasharray="4,3"/>
  </g>

  <text x="259" y="285" font-size="13" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    CASCADING
  </text>
  <text x="259" y="320" font-size="14" fill="#1a1a1a" text-anchor="middle">
    feedback closes
  </text>
  <text x="259" y="338" font-size="14" fill="#1a1a1a" text-anchor="middle">
    the recall gap
  </text>

  <!-- ===== Icon 2: reformulation/estimation (a 2x2 mini matrix) ===== -->
  <g transform="translate(550 190)">
    <rect x="-30" y="0" width="30" height="30" fill="#b8b3a8" fill-opacity="0.4" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="0" y="0" width="30" height="30" fill="#c8553d" fill-opacity="0.4" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="-30" y="30" width="30" height="30" fill="#c8553d" fill-opacity="0.4" stroke="#1a1a1a" stroke-width="1.2"/>
    <rect x="0" y="30" width="30" height="30" fill="#b8b3a8" fill-opacity="0.4" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- diagonal sweet-spot indicator -->
    <line x1="-30" y1="60" x2="30" y2="0" stroke="#c8553d" stroke-width="2"/>
  </g>

  <text x="550" y="285" font-size="13" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    REFORMULATION × ESTIMATION
  </text>
  <text x="550" y="320" font-size="14" fill="#1a1a1a" text-anchor="middle">
    feedback picks the right
  </text>
  <text x="550" y="338" font-size="14" fill="#1a1a1a" text-anchor="middle">
    pair per query
  </text>

  <!-- ===== Icon 3: QUAM (graph with edge to off-graph node) ===== -->
  <g>
    <!-- Reranker and a small affinity graph -->
    <circle cx="820" cy="200" r="6" fill="#c8553d"/>
    <circle cx="855" cy="190" r="6" fill="#c8553d"/>
    <circle cx="850" cy="225" r="6" fill="#c8553d"/>
    <circle cx="885" cy="215" r="6" fill="#2a4747"/>
    <circle cx="890" cy="180" r="6" fill="#2a4747"/>
    <!-- edges -->
    <line x1="820" y1="200" x2="855" y2="190" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="820" y1="200" x2="850" y2="225" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="855" y1="190" x2="850" y2="225" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="855" y1="190" x2="890" y2="180" stroke="#c8553d" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="850" y1="225" x2="885" y2="215" stroke="#c8553d" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <text x="855" y="285" font-size="13" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="0.5">
    QUAM
  </text>
  <text x="855" y="320" font-size="14" fill="#1a1a1a" text-anchor="middle">
    feedback transfers reranker
  </text>
  <text x="855" y="338" font-size="14" fill="#1a1a1a" text-anchor="middle">
    signal back to retrieval
  </text>

  <!-- ============================================================
       Convergence arrows — three lines pointing down to the principle
       ============================================================ -->

  <line x1="259" y1="380" x2="500" y2="475" stroke="#c8553d" stroke-width="1.5" marker-end="url(#arrSyn)"/>
  <line x1="550" y1="380" x2="550" y2="475" stroke="#c8553d" stroke-width="1.5" marker-end="url(#arrSyn)"/>
  <line x1="855" y1="380" x2="600" y2="475" stroke="#c8553d" stroke-width="1.5" marker-end="url(#arrSyn)"/>

  <!-- ============================================================
       PRINCIPLE — large, set as the focal point
       ============================================================ -->

  <rect x="220" y="490" width="660" height="120" fill="#1a1a1a" rx="3"/>

  <text x="550" y="530" font-size="13" fill="#c8553d" text-anchor="middle" font-weight="700" letter-spacing="2">
    THE PRINCIPLE
  </text>
  <text x="550" y="572" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="400">
    Feedback turns a one-shot decision
  </text>
  <text x="550" y="600" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="700">
    into a process.
  </text>

  </svg>
